module: 0
title: "Module 0: The 15-Minute On-Ramp"

chapters:
  - chapter: 0.1
    slug: three-paths-to-first-calm-doc
    title: "Three Paths to Your First CALM Document"
    questions:
      - id: q0.1.1
        type: multiple_choice
        prompt: |
          Which three input types can the calmstudio-mcp skill convert to a valid CALM document?
        options:
          - label: "Plain English description, diagram or image, existing markdown document"
            correct: true
            explanation: "These are the three paths: Talk (describe in plain English), Sketch (image or diagram), Markdown (existing architecture doc like an ARB or RFC)."
          - label: "YAML, JSON, and XML files"
            correct: false
            explanation: "CALM outputs JSON, but these are data serialisation formats, not the three named input paths. The paths describe what the human brings, not what CALM produces."
          - label: "PowerPoint, Visio, and Lucidchart files"
            correct: false
            explanation: "You can upload a screenshot of a Visio diagram as an image (Path B: Sketch), but PowerPoint, Visio, and Lucidchart themselves are not the three named paths."
        reference_section: "../content/module-00-on-ramp/three-paths-to-first-calm-doc.mdx#path-a-talk--describe-in-plain-english"

      - id: q0.1.2
        type: multiple_choice
        prompt: |
          What does Path C (Markdown) do that the other two paths cannot do automatically?
        options:
          - label: "Attach threat model decorators based on the architecture described in the document"
            correct: true
            explanation: "Correct. The calm-arb-convert skill (used in Path C) fetches the architecture markdown and a companion threat model document, producing CALM JSON with threat decorators already attached."
          - label: "Produce a CALM file with more nodes than the other paths"
            correct: false
            explanation: "The number of nodes depends on the description, not the input path. A detailed plain English description (Path A) can produce more nodes than a sparse markdown document."
          - label: "Validate the output automatically so no calm validate step is needed"
            correct: false
            explanation: "All three paths call finalize_architecture which validates internally, but running calm validate afterwards is still recommended as a final check for all paths."
        reference_section: "../content/module-00-on-ramp/three-paths-to-first-calm-doc.mdx#path-c-markdown--from-an-existing-architecture-doc"

  - chapter: 0.2
    slug: live-demo-diagram-to-calm-in-five-minutes
    title: "Live Demo: Diagram to CALM in 5 Minutes"
    questions:
      - id: q0.2.1
        type: multiple_choice
        prompt: |
          In CALM, which relationship type describes a human user opening a web application?
        options:
          - label: "interacts"
            correct: true
            explanation: "Correct. interacts is the CALM relationship type for actors (entities outside the system boundary) interacting with nodes inside the system. A user does not 'connect' to a web app in the network sense — they interact with the interface. CALM Guard and compliance tools rely on this distinction to identify user-facing entry points."
          - label: "connects"
            correct: false
            explanation: "connects is for point-to-point network communication between two system components (e.g. webclient → service over HTTPS). A human user is an actor, not a system component, so the relationship is interacts, not connects."
          - label: "deployed-in"
            correct: false
            explanation: "deployed-in describes a containment relationship — a node running inside an ecosystem (e.g. a service deployed inside a Kubernetes cluster). It does not describe a user's interaction with an application."
          - label: "composed-of"
            correct: false
            explanation: "composed-of describes a node that is made up of other nodes (e.g. a system composed of multiple services). It does not describe a user's interaction with an application."
        reference_section: "../content/module-00-on-ramp/live-demo-diagram-to-calm-in-five-minutes.mdx#relationship-1-user-interacts-todo-web"

  - chapter: 0.3
    slug: why-this-works-and-when-it-doesnt
    title: "Why This Works (and When It Doesn't)"
    questions:
      - id: q0.3.1
        type: multiple_choice
        prompt: |
          Which scenario most likely requires human review of an AI-generated CALM document?
        options:
          - label: "The architecture has 12 nodes and the AI generated it from a 3-sentence description"
            correct: true
            explanation: "Correct. A 3-sentence description rarely captures all the complexity of a 12-node system. The AI fills in structural gaps from training data, which may produce plausible but incorrect nodes, missing components, or wrong relationship directions. Human review is needed whenever the AI is extrapolating beyond what the description explicitly states."
          - label: "The AI used read_calm_guide before creating any nodes"
            correct: false
            explanation: "read_calm_guide is the correct first step — it ensures the AI knows the valid node types and spec constraints before generating anything. This reduces errors rather than requiring review."
          - label: "The architecture contains only actor, service, and database nodes"
            correct: false
            explanation: "Using only well-understood core node types is a sign of a simpler, lower-risk architecture. Fewer exotic types mean fewer opportunities for the AI to hallucinate an incorrect mapping."
          - label: "calm validate returns exit code 0 with no errors"
            correct: false
            explanation: "A clean validate result means the document conforms to the CALM 1.2 schema. Schema validity is necessary but not sufficient — the architecture can be schema-valid while still having wrong relationships, missing nodes, or incorrect protocols. Schema checks do not catch semantic errors."
        reference_section: "../content/module-00-on-ramp/why-this-works-and-when-it-doesnt.mdx"

      - id: q0.3.2
        type: multiple_choice
        prompt: |
          A CALM architecture has a `service` node for a payment API and an `ecosystem` node for the
          AWS production environment. The payment API runs inside that environment. Which relationship
          type correctly models this?
        options:
          - label: "deployed-in (payment-api deployed-in aws-prod)"
            correct: true
            explanation: "Correct. deployed-in describes a node that runs inside an ecosystem — it captures the deployment containment relationship. The ecosystem owns the runtime environment; the service is deployed within it."
          - label: "composed-of (aws-prod composed-of payment-api)"
            correct: false
            explanation: "composed-of describes a node that is structurally made up of other nodes — e.g. a system that is itself composed of multiple subsystems. It describes ownership of structure, not deployment. Running inside an environment is a deployment relationship, not a compositional one."
          - label: "connects (payment-api connects aws-prod)"
            correct: false
            explanation: "connects describes point-to-point network communication between two nodes over a protocol. A service does not 'connect' to its deployment environment — it is deployed inside it. Reserve connects for actual network calls."
          - label: "interacts (payment-api interacts aws-prod)"
            correct: false
            explanation: "interacts is reserved for actor-to-node relationships — specifically for entities outside the system boundary that initiate interactions. A service node is not an actor, and a deployment environment is not an interaction target."
        reference_section: "../content/module-00-on-ramp/why-this-works-and-when-it-doesnt.mdx"

  - chapter: 0.4
    slug: get-set-up-in-sixty-seconds
    title: "Get Set Up in 60 Seconds"
    questions:
      - id: q0.4.1
        type: multiple_choice
        prompt: |
          Which of the following is the correct first step when setting up calmstudio-mcp for Claude Code users?
        options:
          - label: "Run 'claude mcp list' to check if calmstudio-mcp is already configured"
            correct: true
            explanation: "Correct. calmstudio-mcp is distributed as a local .cjs file — not via npm. Claude Code users should first check if it is already registered via 'claude mcp list'. If missing, install from the FINOS architecture-as-code releases page."
          - label: "Run 'npx @calmstudio/mcp --version' to verify the package is available"
            correct: false
            explanation: "Incorrect. @calmstudio/mcp is NOT available on npm. Running this command will fail. The correct first step is 'claude mcp list' to check existing configuration."
          - label: "Run 'npm install -g @calmstudio/mcp' to install the package globally"
            correct: false
            explanation: "Incorrect. @calmstudio/mcp is not on the npm registry. It is distributed as a local .cjs file from the FINOS architecture-as-code releases page."
        reference_section: "../content/module-00-on-ramp/get-set-up-in-sixty-seconds.mdx#option-1-claude-code-cli-check-existing-config-first"

  - chapter: 0.5
    slug: your-first-calm-document
    title: "Your First CALM Document"
    questions:
      - id: q0.5.1
        type: multiple_choice
        prompt: |
          After running `npx @finos/calm-cli validate -a my-system.architecture.json -f pretty`,
          what does a successful result look like?
        options:
          - label: "hasErrors: false in the output (or 'No issues found') and exit code 0"
            correct: true
            explanation: "Correct. The validate command exits with code 0 and prints hasErrors: false (JSON output) or 'No issues found' (pretty output) when the architecture conforms to the CALM 1.2 schema."
          - label: "A green checkmark in the browser"
            correct: false
            explanation: "calm validate is a CLI command — all output goes to the terminal. There is no browser UI for validation."
          - label: "The .calm.json file is automatically saved in a corrected form"
            correct: false
            explanation: "calm validate only checks validity, it does not modify files. If errors are found, you fix the source file manually (or ask the AI to fix it)."
        reference_section: "../content/module-00-on-ramp/your-first-calm-document.mdx#validate-your-architecture"

      - id: q0.5.2
        type: code_completion
        prompt: |
          Complete the missing `node-type` for a node representing the end user of a system.
        snippet: |
          {
            "unique-id": "end-user",
            "name": "End User",
            "node-type": "<BLANK>",
            "description": "Person using the application"
          }
        accepted_answers:
          - "actor"
        explanation: "actor is the CALM type for users and any external entity that initiates interactions with the system. Common mistakes: 'user', 'person', 'human' — none of these exist in the CALM spec."
        reference_section: "../content/module-00-on-ramp/why-this-works-and-when-it-doesnt.mdx#the-9-core-node-types-a-reference-table"

      - id: q0.5.3
        type: multiple_choice
        prompt: |
          Which of these is NOT a valid CALM 1.2 node type?
        options:
          - label: "container"
            correct: true
            explanation: "Correct — container does not exist in the CALM spec. It is a Docker/Kubernetes term that beginners frequently try to use. The 9 valid core types are: actor, ecosystem, system, service, database, network, ldap, webclient, data-asset."
          - label: "database"
            correct: false
            explanation: "database IS a valid CALM node type. It represents any data persistence layer: SQL, NoSQL, cache, queues used as storage."
          - label: "webclient"
            correct: false
            explanation: "webclient IS a valid CALM node type. It represents browser apps, mobile apps, and any frontend interface."
          - label: "actor"
            correct: false
            explanation: "actor IS a valid CALM node type. It represents users and external systems that initiate interactions."
        reference_section: "../content/module-00-on-ramp/why-this-works-and-when-it-doesnt.mdx#the-9-core-node-types-a-reference-table"
