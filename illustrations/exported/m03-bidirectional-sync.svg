<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
    <marker id="arr-left" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Inter, system-ui, sans-serif; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="400" y="30" font-size="20" text-anchor="middle" font-weight="bold">CALM Studio bidirectional sync</text>

  <!-- ===== TOP ROW: Canvas → JSON ===== -->
  <!-- Section label -->
  <text x="10" y="58" font-size="13" font-weight="bold">Canvas edit → JSON update</text>

  <!-- LEFT PANEL: Before -->
  <rect x="10" y="68" width="270" height="160" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="145" y="86" font-size="13" text-anchor="middle" font-weight="bold">Before</text>
  <line x1="10" y1="92" x2="280" y2="92" stroke="#1e1e1e" stroke-width="1"/>
  <!-- Mini canvas with node at top-left -->
  <rect x="20" y="100" width="130" height="110" rx="3" fill="#f9f9f9" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="85" y="114" font-size="9" text-anchor="middle" fill="#777">canvas</text>
  <!-- Service hexagon at top-left of mini canvas -->
  <polygon points="35,130 55,118 75,118 95,130 75,142 55,142" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="65" y="134" font-size="8" text-anchor="middle">service</text>
  <!-- JSON snippet box -->
  <rect x="160" y="100" width="110" height="110" rx="3" fill="#f5f5f5" stroke="#1e1e1e" stroke-width="1"/>
  <text x="215" y="116" font-size="9" text-anchor="middle" font-family="monospace">JSON</text>
  <text x="170" y="134" font-size="8" font-family="monospace">x: 100,</text>
  <text x="170" y="148" font-size="8" font-family="monospace">y: 80,</text>
  <text x="170" y="162" font-size="8" font-family="monospace">node-type:</text>
  <text x="170" y="176" font-size="8" font-family="monospace">"service"</text>

  <!-- Arrow between Before and After -->
  <text x="330" y="135" font-size="10" text-anchor="middle">user drags</text>
  <text x="330" y="149" font-size="10" text-anchor="middle">node on canvas</text>
  <line x1="290" y1="148" x2="370" y2="148" stroke="#1e1e1e" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- RIGHT PANEL: After -->
  <rect x="380" y="68" width="270" height="160" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="515" y="86" font-size="13" text-anchor="middle" font-weight="bold">After</text>
  <line x1="380" y1="92" x2="650" y2="92" stroke="#1e1e1e" stroke-width="1"/>
  <!-- Mini canvas with node moved to bottom-right -->
  <rect x="390" y="100" width="130" height="110" rx="3" fill="#f9f9f9" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="455" y="114" font-size="9" text-anchor="middle" fill="#777">canvas</text>
  <!-- Service hexagon at bottom-right of mini canvas (moved) -->
  <polygon points="470,188 490,176 510,176 530,188 510,200 490,200" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="500" y="192" font-size="8" text-anchor="middle">service</text>
  <!-- Dashed trail showing movement -->
  <line x1="65" y1="130" x2="500" y2="188" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- JSON snippet box with changed values highlighted -->
  <rect x="530" y="100" width="110" height="110" rx="3" fill="#f5f5f5" stroke="#1e1e1e" stroke-width="1"/>
  <text x="585" y="116" font-size="9" text-anchor="middle" font-family="monospace">JSON</text>
  <!-- Underlined/boxed changed values -->
  <text x="540" y="134" font-size="8" font-family="monospace">x: 340,</text>
  <rect x="538" y="124" width="48" height="14" rx="2" fill="none" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="540" y="148" font-size="8" font-family="monospace">y: 220,</text>
  <rect x="538" y="138" width="44" height="14" rx="2" fill="none" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="540" y="162" font-size="8" font-family="monospace">node-type:</text>
  <text x="540" y="176" font-size="8" font-family="monospace">"service"</text>
  <text x="515" y="240" font-size="9" text-anchor="middle" fill="#555" font-style="italic">JSON updates instantly — no manual sync required.</text>

  <!-- ===== HORIZONTAL DIVIDER ===== -->
  <line x1="10" y1="270" x2="790" y2="270" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="400" y="266" font-size="11" text-anchor="middle" fill="#555">&#8593; canvas-to-JSON     JSON-to-canvas &#8595;</text>

  <!-- ===== BOTTOM ROW: JSON → Canvas ===== -->
  <text x="10" y="296" font-size="13" font-weight="bold">JSON edit → Canvas update</text>

  <!-- LEFT: JSON edit panel -->
  <rect x="10" y="310" width="300" height="150" rx="6" fill="#f5f5f5" stroke="#1e1e1e" stroke-width="2"/>
  <text x="160" y="328" font-size="12" text-anchor="middle" font-weight="bold">User edits JSON</text>
  <line x1="10" y1="334" x2="310" y2="334" stroke="#1e1e1e" stroke-width="1"/>
  <text x="25" y="354" font-size="9" font-family="monospace">"x": 340,  &#8594;  "x": 50,</text>
  <text x="25" y="370" font-size="9" font-family="monospace">"y": 220,  &#8594;  "y": 90,</text>
  <text x="25" y="392" font-size="10" fill="#555" font-style="italic">Cursor types in JSON editor</text>
  <text x="25" y="408" font-size="10" fill="#555" font-style="italic">Mutex acquired — canvas locked</text>
  <text x="25" y="424" font-size="10" fill="#555" font-style="italic">until JSON edit complete</text>
  <text x="25" y="440" font-size="10" fill="#555" font-style="italic">Mutex released → canvas redraws</text>

  <!-- Arrow JSON → Canvas -->
  <text x="400" y="370" font-size="10" text-anchor="middle">canvas moves</text>
  <text x="400" y="386" font-size="10" text-anchor="middle">to match</text>
  <line x1="310" y1="385" x2="490" y2="385" stroke="#1e1e1e" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- RIGHT: Canvas result panel -->
  <rect x="490" y="310" width="300" height="150" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="640" y="328" font-size="12" text-anchor="middle" font-weight="bold">Canvas updates</text>
  <line x1="490" y1="334" x2="790" y2="334" stroke="#1e1e1e" stroke-width="1"/>
  <rect x="500" y="345" width="270" height="100" rx="3" fill="#f9f9f9" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="635" y="360" font-size="9" text-anchor="middle" fill="#777">canvas</text>
  <!-- Node now at new position (top-left per new JSON) -->
  <polygon points="515,395 535,383 555,383 575,395 555,407 535,407" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="545" y="399" font-size="8" text-anchor="middle">service</text>

  <!-- Mutex note -->
  <rect x="200" y="476" width="400" height="36" rx="5" fill="#f0f0f0" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="400" y="491" font-size="10" text-anchor="middle">canvas edit &#10003; &#8594; JSON update &#10003; &#8594; (mutex blocks) &#8594; no loop</text>
  <text x="400" y="507" font-size="10" text-anchor="middle" fill="#555">Mutex prevents loops — one change at a time.</text>

  <!-- Caption -->
  <text x="400" y="528" font-size="14" text-anchor="middle" fill="#757575">Module 3.2 — Bidirectional sync: Canvas &#8596; JSON with mutex loop prevention</text>
</svg>
