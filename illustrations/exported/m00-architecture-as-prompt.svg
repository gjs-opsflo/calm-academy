<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
    <marker id="arr-sm" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1e1e1e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#1e1e1e">Describing a system IS creating its spec</text>

  <!-- Architect (stick figure) centered at (95, 220) -->
  <circle cx="95" cy="175" r="18" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="95" y1="193" x2="95" y2="235" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="68" y1="207" x2="122" y2="207" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="95" y1="235" x2="75" y2="265" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="95" y1="235" x2="115" y2="265" stroke="#1e1e1e" stroke-width="2"/>
  <text x="95" y="288" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1e1e1e">Architect</text>

  <!-- Speech bubble (above and to the right of the architect) -->
  <!-- Bubble body -->
  <rect x="120" y="95" width="210" height="75" rx="12" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Pointer triangle (points down-left toward architect) -->
  <polygon points="138,170 118,193 162,170" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Cover internal seam -->
  <line x1="120" y1="170" x2="161" y2="170" stroke="#ffffff" stroke-width="3"/>
  <!-- Speech text -->
  <text x="225" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#1e1e1e">&#34;My system has a web app,</text>
  <text x="225" y="140" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#1e1e1e">an API, and a database.</text>
  <text x="225" y="160" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#1e1e1e">The API reads from the DB.&#34;</text>

  <!-- Arrow: Architect → calmstudio-mcp, labeled "describes" -->
  <line x1="165" y1="220" x2="298" y2="220" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="232" y="212" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#757575">describes</text>

  <!-- calmstudio-mcp box -->
  <rect x="303" y="193" width="175" height="60" rx="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="390" y="222" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#1e1e1e">calmstudio-mcp</text>
  <text x="390" y="242" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#757575">(AI assistant)</text>

  <!-- Arrow: calmstudio-mcp → file, labeled "produces" -->
  <line x1="478" y1="223" x2="548" y2="223" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="513" y="215" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#757575">produces</text>

  <!-- Architecture file box (document shape) -->
  <rect x="553" y="193" width="185" height="60" rx="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2.5"/>
  <text x="645" y="218" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1e1e1e">my-system</text>
  <text x="645" y="238" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1e1e1e">.architecture.json</text>

  <!-- Arrow down from file to downstream row -->
  <line x1="645" y1="253" x2="645" y2="300" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr-sm)"/>

  <!-- Downstream uses row -->
  <!-- CI/CD gate -->
  <rect x="420" y="305" width="145" height="45" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="492" y="330" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#1e1e1e">calm validate</text>
  <text x="492" y="344" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#757575">(CI/CD gate)</text>

  <!-- CALM Guard -->
  <rect x="580" y="305" width="130" height="45" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="645" y="330" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#1e1e1e">CALM Guard</text>
  <text x="645" y="344" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#757575">(compliance)</text>

  <!-- CALM Hub -->
  <rect x="725" y="305" width="55" height="45" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="752" y="330" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#1e1e1e">CALM</text>
  <text x="752" y="344" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#1e1e1e">Hub</text>

  <!-- Branching arrows from file to each downstream box -->
  <line x1="600" y1="300" x2="492" y2="303" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr-sm)"/>
  <line x1="645" y1="300" x2="645" y2="303" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr-sm)"/>
  <line x1="690" y1="300" x2="752" y2="303" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr-sm)"/>

  <!-- Caption -->
  <text x="400" y="420" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#757575">One description → spec + validation + registry + compliance</text>
</svg>
