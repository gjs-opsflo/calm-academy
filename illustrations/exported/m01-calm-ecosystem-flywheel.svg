<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1e1e1e">The Governance Flywheel</text>

  <!-- Background guide circle (dashed) -->
  <circle cx="400" cy="270" r="160" fill="none" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== FOUR STAGE BOXES ===== -->

  <!-- TOP: Validate -->
  <rect x="300" y="68" width="200" height="68" rx="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2.5"/>
  <text x="400" y="94" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1e1e1e">✓ Validate</text>
  <text x="400" y="116" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#555555">calm validate against pattern</text>

  <!-- RIGHT: Detect drift -->
  <rect x="576" y="208" width="200" height="68" rx="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2.5"/>
  <text x="676" y="234" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1e1e1e">⊙ Detect drift</text>
  <text x="676" y="253" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#555555">CALM Guard compares</text>
  <text x="676" y="266" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#555555">to deployed reality</text>

  <!-- BOTTOM: Enforce -->
  <rect x="300" y="408" width="200" height="68" rx="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2.5"/>
  <text x="400" y="434" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="bold" text-anchor="middle" fill="#1e1e1e">⊘ Enforce</text>
  <text x="400" y="455" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#555555">PR fails if architecture</text>
  <text x="400" y="468" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#555555">violates pattern</text>

  <!-- LEFT: Improve patterns -->
  <rect x="24" y="208" width="200" height="68" rx="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2.5"/>
  <text x="124" y="230" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#1e1e1e">↑ Improve patterns</text>
  <text x="124" y="250" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#555555">Patterns evolve from real</text>
  <text x="124" y="263" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#555555">architectures on CALM Hub</text>

  <!-- ===== CLOCKWISE CURVED ARROWS ===== -->
  <!-- TOP → RIGHT (Validate → Detect drift): arc from (500,102) to (576,242) -->
  <path d="M 500,102 Q 610,140 576,242" fill="none" stroke="#1e1e1e" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- RIGHT → BOTTOM (Detect drift → Enforce): arc from (676,276) to (500,442) -->
  <path d="M 676,276 Q 680,390 500,442" fill="none" stroke="#1e1e1e" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- BOTTOM → LEFT (Enforce → Improve patterns): arc from (300,442) to (224,276) -->
  <path d="M 300,442 Q 190,390 224,276" fill="none" stroke="#1e1e1e" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- LEFT → TOP (Improve patterns → Validate): arc from (124,208) to (300,102) -->
  <path d="M 124,208 Q 120,130 300,102" fill="none" stroke="#1e1e1e" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Center label -->
  <text x="400" y="258" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#1e1e1e">The governance</text>
  <text x="400" y="278" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#1e1e1e">flywheel</text>
  <text x="400" y="300" font-family="Inter, system-ui, sans-serif" font-size="22" text-anchor="middle" fill="#1e1e1e">↻</text>

  <!-- Caption -->
  <text x="400" y="510" font-family="Inter, system-ui, sans-serif" font-size="14" font-style="italic" text-anchor="middle" fill="#1e1e1e">Each turn of the wheel makes the next architecture safer to ship.</text>
  <text x="400" y="538" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#757575">CALM Guard keeps the wheel turning — automatically, at every PR.</text>
</svg>
