<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Inter, system-ui, sans-serif; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="400" y="30" font-size="19" text-anchor="middle" font-weight="bold">connects vs interacts</text>

  <!-- Panel divider -->
  <line x1="400" y1="44" x2="400" y2="490" stroke="#cccccc" stroke-width="1.5"/>

  <!-- ===== LEFT PANEL: connects ===== -->
  <text x="200" y="62" font-size="17" text-anchor="middle" font-weight="bold">connects</text>

  <!-- webclient node: payments-portal -->
  <rect x="26" y="88" width="138" height="82" rx="4" ry="4" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <rect x="26" y="88" width="138" height="22" rx="4" ry="4" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <line x1="26" y1="110" x2="164" y2="110" stroke="#1e1e1e" stroke-width="1"/>
  <circle cx="38" cy="99" r="4" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <circle cx="52" cy="99" r="4" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <rect x="64" y="93" width="62" height="12" rx="3" ry="3" stroke="#1e1e1e" stroke-width="1" fill="#ffffff"/>
  <text x="95" y="148" font-size="11" text-anchor="middle">payments-portal</text>
  <text x="95" y="163" font-size="10" text-anchor="middle" fill="#757575">(webclient)</text>

  <!-- Arrow with HTTPS badge -->
  <line x1="164" y1="129" x2="230" y2="129" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Protocol badge -->
  <rect x="174" y="110" width="48" height="18" rx="3" ry="3" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <text x="198" y="123" font-size="10" text-anchor="middle" font-weight="bold">HTTPS</text>
  <text x="198" y="146" font-size="10" text-anchor="middle" fill="#757575">protocol: HTTPS</text>
  <text x="198" y="158" font-size="9" text-anchor="middle" fill="#757575">← TOP LEVEL</text>

  <!-- hexagon service: payments-service -->
  <polygon points="280,96 324,120 324,168 280,192 236,168 236,120" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="280" y="140" font-size="11" text-anchor="middle">payments</text>
  <text x="280" y="156" font-size="11" text-anchor="middle">-service</text>
  <text x="280" y="206" font-size="10" text-anchor="middle" fill="#757575">(service)</text>

  <!-- Caption -->
  <text x="200" y="235" font-size="13" text-anchor="middle">node-to-node with a wire protocol</text>

  <!-- Code snippet -->
  <rect x="20" y="248" width="358" height="82" rx="4" ry="4" stroke="#cccccc" stroke-width="1" fill="#ffffff"/>
  <text x="36" y="268" font-size="11">"relationship-type": {</text>
  <text x="36" y="284" font-size="11">  "connects": { source, destination }</text>
  <text x="36" y="300" font-size="11">},</text>
  <text x="36" y="316" font-size="11">"protocol": "HTTPS"</text>

  <!-- ===== RIGHT PANEL: interacts ===== -->
  <text x="600" y="62" font-size="17" text-anchor="middle" font-weight="bold">interacts</text>

  <!-- Stick figure actor: payments-analyst -->
  <circle cx="452" cy="106" r="20" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <line x1="452" y1="126" x2="452" y2="162" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="428" y1="142" x2="476" y2="142" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="452" y1="162" x2="432" y2="186" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="452" y1="162" x2="472" y2="186" stroke="#1e1e1e" stroke-width="2"/>
  <text x="452" y="206" font-size="11" text-anchor="middle">payments-analyst</text>
  <text x="452" y="220" font-size="10" text-anchor="middle" fill="#757575">(actor)</text>

  <!-- Arrow -->
  <line x1="476" y1="142" x2="554" y2="142" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="515" y="132" font-size="10" text-anchor="middle">actor: payments-analyst</text>
  <text x="515" y="158" font-size="10" text-anchor="middle" fill="#757575">(no protocol field)</text>

  <!-- webclient node: payments-portal -->
  <rect x="556" y="96" width="130" height="82" rx="4" ry="4" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <rect x="556" y="96" width="130" height="22" rx="4" ry="4" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <line x1="556" y1="118" x2="686" y2="118" stroke="#1e1e1e" stroke-width="1"/>
  <circle cx="568" cy="107" r="4" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <rect x="580" y="101" width="60" height="12" rx="3" ry="3" stroke="#1e1e1e" stroke-width="1" fill="#ffffff"/>
  <text x="621" y="155" font-size="11" text-anchor="middle">payments-portal</text>
  <text x="621" y="170" font-size="10" text-anchor="middle" fill="#757575">(webclient)</text>

  <!-- Caption -->
  <text x="600" y="235" font-size="13" text-anchor="middle">actor pulls the trigger; protocol omitted</text>

  <!-- Code snippet -->
  <rect x="406" y="248" width="358" height="82" rx="4" ry="4" stroke="#cccccc" stroke-width="1" fill="#ffffff"/>
  <text x="422" y="268" font-size="11">"relationship-type": {</text>
  <text x="422" y="284" font-size="11">  "interacts": {</text>
  <text x="422" y="300" font-size="11">    "actor": "payments-analyst",</text>
  <text x="422" y="316" font-size="11">    "nodes": [ ... ] } }</text>

  <!-- Bottom annotation -->
  <rect x="18" y="356" width="764" height="70" rx="6" ry="6" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3" fill="#ffffff"/>
  <text x="400" y="380" font-size="12" text-anchor="middle">connects is symmetric data flow with a wire protocol. interacts is human/external intent.</text>
  <text x="400" y="400" font-size="12" text-anchor="middle">The actor field in interacts MUST reference a node of node-type: actor.</text>
</svg>
