<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540" style="background:#ffffff">
  <defs>
    <marker id="arr-dash" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Virgil, 'Segoe UI Emoji', cursive; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="400" y="28" font-size="19" text-anchor="middle" font-weight="bold">Decorator as External Overlay</text>

  <!-- Vertical dashed divider -->
  <line x1="400" y1="42" x2="400" y2="480" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- ===== LEFT DOCUMENT: conference-signup.architecture.json ===== -->
  <!-- Document box -->
  <rect x="22" y="48" width="340" height="300" rx="6" ry="6" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <!-- Title bar -->
  <rect x="22" y="48" width="340" height="36" rx="6" ry="6" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <line x1="22" y1="84" x2="362" y2="84" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="192" y="71" font-size="11" text-anchor="middle" font-weight="bold">conference-signup.architecture.json</text>

  <!-- Node list items -->
  <text x="50" y="106" font-size="12">conference-attendee (actor)</text>
  <line x1="40" y1="112" x2="358" y2="112" stroke="#cccccc" stroke-width="1"/>
  <text x="50" y="130" font-size="12">conference-website (webclient)</text>
  <line x1="40" y1="136" x2="358" y2="136" stroke="#cccccc" stroke-width="1"/>
  <text x="50" y="154" font-size="12">load-balancer (network)</text>
  <line x1="40" y1="160" x2="358" y2="160" stroke="#cccccc" stroke-width="1"/>

  <!-- Highlighted rows: attendees, attendees-store -->
  <rect x="26" y="163" width="332" height="28" rx="2" ry="2" stroke="none" fill="#f0f0f0"/>
  <text x="50" y="182" font-size="12">attendees (service)</text>
  <rect x="26" y="191" width="332" height="28" rx="2" ry="2" stroke="none" fill="#f0f0f0"/>
  <text x="50" y="210" font-size="12">attendees-store (database)</text>
  <line x1="40" y1="218" x2="358" y2="218" stroke="#cccccc" stroke-width="1"/>

  <text x="50" y="238" font-size="12">k8s-cluster (system)</text>

  <!-- Dog-ear icon on left document -->
  <line x1="340" y1="48" x2="362" y2="70" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="340" y1="48" x2="340" y2="70" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="340" y1="70" x2="362" y2="70" stroke="#1e1e1e" stroke-width="1.5"/>

  <!-- ===== RIGHT DOCUMENT: conference-signup.threat-model.decorator.json ===== -->
  <rect x="438" y="48" width="340" height="300" rx="6" ry="6" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <rect x="438" y="48" width="340" height="36" rx="6" ry="6" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <line x1="438" y1="84" x2="778" y2="84" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="608" y="68" font-size="10" text-anchor="middle" font-weight="bold">conference-signup.threat-model.decorator.json</text>

  <!-- Fields in right document -->
  <text x="456" y="106" font-size="11">unique-id: "conference-signup-threat-model"</text>
  <line x1="448" y1="112" x2="774" y2="112" stroke="#cccccc" stroke-width="1"/>
  <text x="456" y="130" font-size="11">type: "threat"</text>
  <line x1="448" y1="136" x2="774" y2="136" stroke="#cccccc" stroke-width="1"/>
  <text x="456" y="154" font-size="11" font-weight="bold">target: ["conference-signup.architecture.json"]</text>
  <line x1="448" y1="160" x2="774" y2="160" stroke="#cccccc" stroke-width="1"/>
  <text x="456" y="178" font-size="11" font-weight="bold">applies-to: ["attendees", "attendees-store"]</text>
  <line x1="448" y1="184" x2="774" y2="184" stroke="#cccccc" stroke-width="1"/>
  <text x="456" y="200" font-size="11">data: { stride: {</text>
  <text x="456" y="216" font-size="11">  spoofing: "...",</text>
  <text x="456" y="232" font-size="11">  tampering: "..." } }</text>

  <!-- Dog-ear icon on right document -->
  <line x1="756" y1="48" x2="778" y2="70" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="756" y1="48" x2="756" y2="70" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="756" y1="70" x2="778" y2="70" stroke="#1e1e1e" stroke-width="1.5"/>

  <!-- DASHED ARROW 1: from target field to left document header -->
  <line x1="438" y1="154" x2="362" y2="70" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-dash)"/>
  <text x="390" y="118" font-size="10" fill="#757575" transform="rotate(-30,390,118)">points at the file</text>

  <!-- DASHED ARROW 2: from applies-to field to highlighted nodes -->
  <line x1="438" y1="178" x2="362" y2="196" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-dash)"/>
  <text x="388" y="186" font-size="10" fill="#757575">points at specific nodes</text>

  <!-- Bottom annotation -->
  <rect x="18" y="378" width="764" height="46" rx="6" ry="6" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3" fill="#ffffff"/>
  <text x="400" y="398" font-size="13" text-anchor="middle">Decorators live in separate documents.</text>
  <text x="400" y="416" font-size="13" text-anchor="middle">They enrich without modifying.</text>
</svg>
