<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Inter, system-ui, sans-serif; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="400" y="26" font-size="18" text-anchor="middle" font-weight="bold">Anatomy of a CALM 1.2 Architecture Document</text>

  <!-- Outer document box -->
  <rect x="22" y="40" width="466" height="470" rx="8" ry="8" stroke="#1e1e1e" stroke-width="3" fill="#ffffff"/>
  <rect x="22" y="40" width="466" height="34" rx="8" ry="8" stroke="#1e1e1e" stroke-width="3" fill="#ffffff"/>
  <line x1="22" y1="74" x2="488" y2="74" stroke="#1e1e1e" stroke-width="2"/>
  <text x="255" y="63" font-size="13" text-anchor="middle" font-weight="bold">.architecture.json</text>

  <!-- REQUIRED fields (heavy border rows) -->
  <!-- $schema -->
  <rect x="40" y="84" width="430" height="46" rx="3" ry="3" stroke="#1e1e1e" stroke-width="2.5" fill="#ffffff"/>
  <text x="60" y="101" font-size="13" font-weight="bold">$schema</text>
  <text x="60" y="120" font-size="11" fill="#757575">REQUIRED — points to CALM JSON Schema version</text>

  <!-- unique-id -->
  <rect x="40" y="138" width="430" height="46" rx="3" ry="3" stroke="#1e1e1e" stroke-width="2.5" fill="#ffffff"/>
  <text x="60" y="155" font-size="13" font-weight="bold">unique-id</text>
  <text x="60" y="174" font-size="11" fill="#757575">REQUIRED — kebab-case identifier (e.g. "conference-signup")</text>

  <!-- name -->
  <rect x="40" y="192" width="430" height="46" rx="3" ry="3" stroke="#1e1e1e" stroke-width="2.5" fill="#ffffff"/>
  <text x="60" y="209" font-size="13" font-weight="bold">name</text>
  <text x="60" y="228" font-size="11" fill="#757575">REQUIRED — human-readable display name</text>

  <!-- description -->
  <rect x="40" y="246" width="430" height="46" rx="3" ry="3" stroke="#1e1e1e" stroke-width="2.5" fill="#ffffff"/>
  <text x="60" y="263" font-size="13" font-weight="bold">description</text>
  <text x="60" y="282" font-size="11" fill="#757575">REQUIRED — what this architecture represents</text>

  <!-- OPTIONAL fields (normal border) -->
  <!-- nodes[] -->
  <rect x="40" y="300" width="430" height="46" rx="3" ry="3" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <text x="60" y="317" font-size="13">nodes[ ]</text>
  <text x="60" y="336" font-size="11" fill="#757575">optional — array of node objects</text>

  <!-- relationships[] -->
  <rect x="40" y="354" width="430" height="46" rx="3" ry="3" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <text x="60" y="371" font-size="13">relationships[ ]</text>
  <text x="60" y="390" font-size="11" fill="#757575">optional — array of relationship objects</text>

  <!-- metadata -->
  <rect x="40" y="408" width="430" height="46" rx="3" ry="3" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3" fill="#ffffff"/>
  <text x="60" y="425" font-size="13" fill="#757575">metadata</text>
  <text x="60" y="444" font-size="11" fill="#cccccc">optional — tags, owner, team etc.</text>

  <!-- CALLOUT 1: nodes[] expansion -->
  <line x1="488" y1="320" x2="528" y2="320" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="528" y="260" width="240" height="130" rx="4" ry="4" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <text x="648" y="278" font-size="11" text-anchor="middle" font-weight="bold">node object</text>
  <line x1="528" y1="284" x2="768" y2="284" stroke="#cccccc" stroke-width="1"/>
  <text x="544" y="300" font-size="11">unique-id  *</text>
  <text x="544" y="318" font-size="11">node-type  *</text>
  <text x="544" y="336" font-size="11">name       *</text>
  <text x="544" y="354" font-size="11">description *</text>
  <text x="700" y="372" font-size="10" fill="#757575">* = REQUIRED</text>

  <!-- CALLOUT 2: relationships[] expansion -->
  <line x1="488" y1="374" x2="528" y2="430" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="528" y="430" width="240" height="110" rx="4" ry="4" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <text x="648" y="448" font-size="11" text-anchor="middle" font-weight="bold">relationship object</text>
  <line x1="528" y1="454" x2="768" y2="454" stroke="#cccccc" stroke-width="1"/>
  <text x="544" y="470" font-size="11">unique-id</text>
  <text x="544" y="488" font-size="11">relationship-type: { connects: {...} }</text>
  <text x="544" y="506" font-size="11">protocol: "HTTPS"</text>
  <!-- Arrow pointing at protocol -->
  <text x="706" y="504" font-size="9" fill="#757575">← TOP LEVEL</text>
  <text x="706" y="516" font-size="9" fill="#757575">not inside connects</text>

  <!-- Bottom annotation -->
  <text x="400" y="570" font-size="13" text-anchor="middle" fill="#757575">Four fields are required. Everything else is optional but recommended.</text>
</svg>
