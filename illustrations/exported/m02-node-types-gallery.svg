<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Inter, system-ui, sans-serif; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="400" y="34" font-size="20" text-anchor="middle" font-weight="bold">The 9 CALM 1.2 Core Node Types</text>

  <!-- Grid vertical separators -->
  <line x1="267" y1="50" x2="267" y2="518" stroke="#cccccc" stroke-width="1"/>
  <line x1="533" y1="50" x2="533" y2="518" stroke="#cccccc" stroke-width="1"/>
  <!-- Grid horizontal separators -->
  <line x1="20" y1="208" x2="780" y2="208" stroke="#cccccc" stroke-width="1"/>
  <line x1="20" y1="368" x2="780" y2="368" stroke="#cccccc" stroke-width="1"/>

  <!-- === ROW 1 === -->

  <!-- CELL 1: actor — stick figure centred at 134,120 -->
  <circle cx="134" cy="88" r="20" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <line x1="134" y1="108" x2="134" y2="152" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="104" y1="128" x2="164" y2="128" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="134" y1="152" x2="108" y2="180" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="134" y1="152" x2="160" y2="180" stroke="#1e1e1e" stroke-width="2"/>
  <text x="134" y="200" font-size="14" text-anchor="middle">actor</text>

  <!-- CELL 2: ecosystem — large dashed rect -->
  <rect x="295" y="62" width="175" height="118" rx="7" ry="7" stroke="#1e1e1e" stroke-width="2" stroke-dasharray="8,4" fill="#ffffff"/>
  <text x="382" y="128" font-size="12" text-anchor="middle" font-style="italic">ecosystem</text>
  <text x="382" y="200" font-size="14" text-anchor="middle">ecosystem</text>

  <!-- CELL 3: system — solid rounded rect with thick border -->
  <rect x="553" y="67" width="168" height="108" rx="6" ry="6" stroke="#1e1e1e" stroke-width="3" fill="#ffffff"/>
  <text x="637" y="128" font-size="12" text-anchor="middle" font-style="italic">system</text>
  <text x="637" y="200" font-size="14" text-anchor="middle">system</text>

  <!-- === ROW 2 === -->

  <!-- CELL 4: service — hexagon -->
  <polygon points="134,225 176,248 176,294 134,317 92,294 92,248" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="134" y="276" font-size="12" text-anchor="middle">service</text>
  <text x="134" y="360" font-size="14" text-anchor="middle">service</text>

  <!-- CELL 5: database — cylinder -->
  <ellipse cx="382" cy="248" rx="58" ry="14" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <rect x="324" y="248" width="116" height="64" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <ellipse cx="382" cy="312" rx="58" ry="14" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="382" y="360" font-size="14" text-anchor="middle">database</text>

  <!-- CELL 6: network — cloud shape -->
  <path d="M580,292 Q570,268 594,262 Q598,244 618,246 Q624,230 646,234 Q668,224 676,244 Q694,240 698,260 Q716,260 714,278 Q714,300 696,298 Q686,314 668,308 Q656,322 636,314 Q618,326 604,312 Q580,312 580,292 Z"
        stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="648" y="360" font-size="14" text-anchor="middle">network</text>

  <!-- === ROW 3 === -->

  <!-- CELL 7: webclient — browser window -->
  <rect x="54" y="382" width="158" height="104" rx="4" ry="4" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <rect x="54" y="382" width="158" height="24" rx="4" ry="4" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <line x1="54" y1="406" x2="212" y2="406" stroke="#1e1e1e" stroke-width="1.5"/>
  <circle cx="66" cy="394" r="4" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <circle cx="80" cy="394" r="4" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <rect x="92" y="388" width="88" height="12" rx="3" ry="3" stroke="#1e1e1e" stroke-width="1" fill="#ffffff"/>
  <text x="133" y="452" font-size="11" text-anchor="middle">webclient</text>
  <text x="133" y="520" font-size="14" text-anchor="middle">webclient</text>

  <!-- CELL 8: ldap — rect with LDAP header band -->
  <rect x="295" y="382" width="175" height="104" rx="4" ry="4" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <rect x="295" y="382" width="175" height="24" rx="4" ry="4" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <line x1="295" y1="406" x2="470" y2="406" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="382" y="400" font-size="12" text-anchor="middle" font-weight="bold">LDAP</text>
  <!-- Tree structure -->
  <line x1="322" y1="416" x2="322" y2="474" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="322" y1="428" x2="350" y2="428" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="322" y1="448" x2="350" y2="448" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="322" y1="468" x2="350" y2="468" stroke="#1e1e1e" stroke-width="1.5"/>
  <rect x="350" y="420" width="50" height="16" rx="2" stroke="#1e1e1e" stroke-width="1" fill="#ffffff"/>
  <rect x="350" y="440" width="50" height="16" rx="2" stroke="#1e1e1e" stroke-width="1" fill="#ffffff"/>
  <rect x="350" y="460" width="50" height="16" rx="2" stroke="#1e1e1e" stroke-width="1" fill="#ffffff"/>
  <text x="382" y="520" font-size="14" text-anchor="middle">ldap</text>

  <!-- CELL 9: data-asset — document with dog-ear -->
  <path d="M566,382 L756,382 L756,486 L566,486 Z" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <!-- Dog-ear top-right -->
  <path d="M736,382 L756,402 L736,402 Z" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <!-- Document lines -->
  <line x1="580" y1="414" x2="732" y2="414" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="580" y1="430" x2="732" y2="430" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="580" y1="446" x2="732" y2="446" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="580" y1="462" x2="710" y2="462" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="661" y="520" font-size="14" text-anchor="middle">data-asset</text>

  <!-- Bottom annotation -->
  <text x="400" y="558" font-size="13" text-anchor="middle" fill="#757575">Use these exact strings in the node-type field. No others.</text>
</svg>
