<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>

  <!-- Browser window frame -->
  <rect x="30" y="30" width="740" height="420" rx="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>

  <!-- Title bar -->
  <rect x="30" y="30" width="740" height="36" rx="8" fill="#f5f5f5" stroke="#1e1e1e" stroke-width="0"/>
  <rect x="30" y="54" width="740" height="12" fill="#f5f5f5" stroke="none"/>
  <line x1="30" y1="66" x2="770" y2="66" stroke="#1e1e1e" stroke-width="1.5"/>

  <!-- Window controls (macOS style circles) -->
  <circle cx="54" cy="48" r="7" fill="none" stroke="#1e1e1e" stroke-width="1.5"/>
  <circle cx="74" cy="48" r="7" fill="none" stroke="#1e1e1e" stroke-width="1.5"/>
  <circle cx="94" cy="48" r="7" fill="none" stroke="#1e1e1e" stroke-width="1.5"/>

  <!-- Address bar -->
  <rect x="130" y="38" width="460" height="20" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="360" y="53" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#757575">localhost:3000/calm-studio</text>

  <!-- App label -->
  <text x="680" y="53" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1e1e1e">CALM Studio</text>

  <!-- Canvas area background grid hint -->
  <rect x="30" y="66" width="740" height="384" fill="#fafafa" stroke="none"/>
  <rect x="30" y="66" width="740" height="384" fill="none" stroke="#1e1e1e" stroke-width="0"/>

  <!-- Node: Actor (stick figure) "User" -->
  <!-- Head -->
  <circle cx="120" cy="150" r="18" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Body -->
  <line x1="120" y1="168" x2="120" y2="210" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Arms -->
  <line x1="94" y1="182" x2="146" y2="182" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Left leg -->
  <line x1="120" y1="210" x2="100" y2="240" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Right leg -->
  <line x1="120" y1="210" x2="140" y2="240" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Label -->
  <text x="120" y="265" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1e1e1e">User</text>
  <text x="120" y="282" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#757575">(actor)</text>

  <!-- Node: Webclient "Todo Web App" - browser frame shape -->
  <rect x="230" y="120" width="185" height="90" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Browser header strip -->
  <rect x="230" y="120" width="185" height="22" rx="6" fill="#f0f0f0" stroke="none"/>
  <rect x="230" y="132" width="185" height="10" fill="#f0f0f0" stroke="none"/>
  <line x1="230" y1="142" x2="415" y2="142" stroke="#1e1e1e" stroke-width="1"/>
  <!-- URL bar inside header -->
  <rect x="246" y="125" width="90" height="13" rx="3" fill="#ffffff" stroke="#1e1e1e" stroke-width="1"/>
  <!-- Label -->
  <text x="322" y="165" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1e1e1e">Todo Web App</text>
  <text x="322" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#757575">(webclient)</text>

  <!-- Node: Service "Todo API" - hexagon-style diamond -->
  <rect x="430" y="245" width="160" height="60" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="510" y="272" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1e1e1e">Todo API</text>
  <text x="510" y="293" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#757575">(service)</text>

  <!-- Node: Database "Todo Database" - cylinder shape -->
  <!-- Left side line -->
  <line x1="535" y1="350" x2="535" y2="398" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Right side line -->
  <line x1="685" y1="350" x2="685" y2="398" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Top ellipse -->
  <ellipse cx="610" cy="350" rx="75" ry="14" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Bottom arc -->
  <path d="M 535 398 A 75 14 0 0 0 685 398" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Label -->
  <text x="610" y="378" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#1e1e1e">Todo Database</text>
  <text x="610" y="418" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#757575">(database)</text>

  <!-- Connections -->
  <!-- User → Todo Web App -->
  <line x1="143" y1="190" x2="228" y2="175" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Todo Web App → Todo API -->
  <line x1="390" y1="196" x2="468" y2="248" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Todo API → Todo Database -->
  <line x1="540" y1="305" x2="580" y2="347" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Caption -->
  <text x="400" y="472" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#757575">CALM Studio — your architecture visualized</text>
</svg>
