<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Inter, system-ui, sans-serif; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="400" y="28" font-size="19" text-anchor="middle" font-weight="bold">Interface Anatomy</text>

  <!-- orders-api hexagon at top centre -->
  <polygon points="400,44 450,70 450,122 400,148 350,122 350,70" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="400" y="92" font-size="12" text-anchor="middle">orders-api</text>
  <text x="400" y="108" font-size="11" text-anchor="middle">(service)</text>

  <!-- Callout label: interfaces[] -->
  <line x1="400" y1="148" x2="400" y2="178" stroke="#1e1e1e" stroke-width="2"/>
  <rect x="348" y="178" width="104" height="28" rx="4" ry="4" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="400" y="197" font-size="13" text-anchor="middle" font-weight="bold">interfaces[ ]</text>

  <!-- Lines from callout to two boxes -->
  <line x1="366" y1="206" x2="200" y2="248" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="434" y1="206" x2="600" y2="248" stroke="#1e1e1e" stroke-width="1.5"/>

  <!-- ===== LEFT: freeform interface-type ===== -->
  <text x="200" y="244" font-size="12" text-anchor="middle" fill="#757575">freeform (interface-type)</text>
  <rect x="68" y="252" width="264" height="122" rx="5" ry="5" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="200" y="275" font-size="11" text-anchor="middle" font-weight="bold">unique-id: "orders-api-rest"</text>
  <line x1="68" y1="282" x2="332" y2="282" stroke="#cccccc" stroke-width="1"/>
  <text x="200" y="299" font-size="11" text-anchor="middle">name: "Orders REST API"</text>
  <text x="200" y="317" font-size="11" text-anchor="middle">protocol: "HTTPS"</text>
  <text x="200" y="335" font-size="11" text-anchor="middle">port: 8443</text>
  <text x="200" y="353" font-size="10" text-anchor="middle" fill="#757575">no definition-url required</text>

  <!-- ===== RIGHT: formal interface-definition ===== -->
  <text x="600" y="244" font-size="12" text-anchor="middle" fill="#757575">formal (interface-definition)</text>
  <rect x="468" y="252" width="264" height="122" rx="5" ry="5" stroke="#1e1e1e" stroke-width="3" fill="#ffffff"/>
  <text x="600" y="275" font-size="11" text-anchor="middle" font-weight="bold">unique-id: "orders-api-host-port" *</text>
  <line x1="468" y1="282" x2="732" y2="282" stroke="#cccccc" stroke-width="1"/>
  <text x="600" y="299" font-size="10" text-anchor="middle">definition-url: "https://calm.finos.org/</text>
  <text x="600" y="313" font-size="10" text-anchor="middle">  .../tcp-host-port.json" *</text>
  <text x="600" y="329" font-size="10" text-anchor="middle">config: { host: "orders-api.internal",</text>
  <text x="600" y="345" font-size="10" text-anchor="middle">          port: 8443 } *</text>
  <text x="600" y="363" font-size="10" text-anchor="middle" fill="#757575">* = REQUIRED field</text>

  <!-- Separator line -->
  <line x1="20" y1="400" x2="780" y2="400" stroke="#cccccc" stroke-width="1"/>
  <text x="400" y="418" font-size="13" text-anchor="middle" fill="#757575">Relationship references at wire level:</text>

  <!-- connects arrow with interface bubbles -->
  <!-- Left node: analyst-portal (webclient) -->
  <rect x="56" y="432" width="136" height="68" rx="4" ry="4" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <rect x="56" y="432" width="136" height="20" rx="4" ry="4" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <line x1="56" y1="452" x2="192" y2="452" stroke="#1e1e1e" stroke-width="1"/>
  <text x="124" y="480" font-size="11" text-anchor="middle">analyst-portal</text>
  <text x="124" y="494" font-size="10" text-anchor="middle" fill="#757575">(webclient)</text>

  <!-- Arrow -->
  <line x1="192" y1="466" x2="556" y2="466" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Source interface annotation bubble -->
  <rect x="200" y="440" width="138" height="20" rx="4" ry="4" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4,2" fill="#ffffff"/>
  <text x="269" y="454" font-size="10" text-anchor="middle">source.interfaces: ['analyst-portal-url']</text>
  <!-- Dest interface annotation bubble -->
  <rect x="352" y="476" width="142" height="20" rx="4" ry="4" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4,2" fill="#ffffff"/>
  <text x="423" y="490" font-size="10" text-anchor="middle">dest.interfaces: ['orders-api-rest']</text>

  <!-- Right node: orders-api (service) hexagon -->
  <polygon points="620,436 656,456 656,496 620,516 584,496 584,456" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="620" y="476" font-size="11" text-anchor="middle">orders-api</text>
  <text x="620" y="490" font-size="10" text-anchor="middle">(service)</text>

  <!-- Bottom annotation -->
  <text x="400" y="548" font-size="13" text-anchor="middle" fill="#757575">Interfaces live on NODES. Relationships reference interface unique-ids.</text>
</svg>
