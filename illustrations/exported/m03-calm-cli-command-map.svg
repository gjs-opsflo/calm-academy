<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" style="background:#ffffff">
  <style>text { font-family: Inter, system-ui, sans-serif; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="450" y="26" font-size="18" font-weight="bold" text-anchor="middle">CALM CLI — Command Taxonomy</text>

  <!-- Root: calm -->
  <rect x="355" y="38" width="190" height="46" rx="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="3"/>
  <text x="450" y="58" font-size="16" font-weight="bold" text-anchor="middle">calm</text>
  <text x="450" y="76" font-size="11" text-anchor="middle" fill="#757575">npx @finos/calm-cli · v1.45.0</text>

  <!-- Trunk down to horizontal bar -->
  <line x1="450" y1="84" x2="450" y2="106" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="50" y1="106" x2="850" y2="106" stroke="#1e1e1e" stroke-width="2"/>

  <!-- 8 vertical drops — centers at 50, 164, 278, 392, 506, 620, 734, 848 -->
  <line x1="50"  y1="106" x2="50"  y2="124" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="164" y1="106" x2="164" y2="124" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="278" y1="106" x2="278" y2="124" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="392" y1="106" x2="392" y2="124" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="506" y1="106" x2="506" y2="124" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="620" y1="106" x2="620" y2="124" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="734" y1="106" x2="734" y2="124" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="848" y1="106" x2="848" y2="124" stroke="#1e1e1e" stroke-width="1.5"/>

  <!-- validate (cx=50) -->
  <rect x="6" y="124" width="88" height="36" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="50" y="147" font-size="13" font-weight="bold" text-anchor="middle">validate</text>
  <text x="50" y="172" font-size="10" text-anchor="middle" fill="#757575">schema + pattern check</text>

  <!-- generate (cx=164) -->
  <rect x="120" y="124" width="88" height="36" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="164" y="147" font-size="13" font-weight="bold" text-anchor="middle">generate</text>
  <text x="164" y="172" font-size="10" text-anchor="middle" fill="#757575">pattern → arch</text>

  <!-- diff (cx=278) -->
  <rect x="234" y="124" width="88" height="36" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="278" y="147" font-size="13" font-weight="bold" text-anchor="middle">diff</text>
  <text x="278" y="172" font-size="10" text-anchor="middle" fill="#757575">compare versions</text>

  <!-- hub (cx=392) — heavy border, center position for sub-commands -->
  <rect x="348" y="124" width="88" height="36" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="3"/>
  <text x="392" y="147" font-size="13" font-weight="bold" text-anchor="middle">hub</text>

  <!-- hub sub-commands -->
  <line x1="392" y1="160" x2="392" y2="178" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="330" y1="178" x2="454" y2="178" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="330" y1="178" x2="330" y2="192" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="392" y1="178" x2="392" y2="192" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="454" y1="178" x2="454" y2="192" stroke="#1e1e1e" stroke-width="1.5"/>
  <rect x="299" y="192" width="62" height="28" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="330" y="210" font-size="12" font-weight="bold" text-anchor="middle">push</text>
  <rect x="361" y="192" width="62" height="28" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="392" y="210" font-size="12" font-weight="bold" text-anchor="middle">pull</text>
  <rect x="423" y="192" width="62" height="28" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="454" y="210" font-size="12" font-weight="bold" text-anchor="middle">list</text>
  <text x="392" y="236" font-size="10" text-anchor="middle" fill="#757575">Hub registry</text>

  <!-- timeline (cx=506) -->
  <rect x="462" y="124" width="88" height="36" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="506" y="147" font-size="13" font-weight="bold" text-anchor="middle">timeline</text>
  <text x="506" y="172" font-size="10" text-anchor="middle" fill="#757575">git audit trail</text>

  <!-- docify (cx=620) -->
  <rect x="576" y="124" width="88" height="36" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="620" y="147" font-size="13" font-weight="bold" text-anchor="middle">docify</text>
  <text x="620" y="172" font-size="10" text-anchor="middle" fill="#757575">generate docs</text>

  <!-- template (cx=734) -->
  <rect x="690" y="124" width="88" height="36" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="734" y="147" font-size="13" font-weight="bold" text-anchor="middle">template</text>
  <text x="734" y="172" font-size="10" text-anchor="middle" fill="#757575">Handlebars render</text>

  <!-- init-ai (cx=848) -->
  <rect x="804" y="124" width="88" height="36" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="848" y="147" font-size="13" font-weight="bold" text-anchor="middle">init-ai</text>
  <text x="848" y="172" font-size="10" text-anchor="middle" fill="#757575">AI agent setup</text>

  <!-- Caption -->
  <text x="450" y="280" font-size="13" text-anchor="middle" fill="#757575">8 top-level commands — hub expands to push · pull · list sub-commands</text>
</svg>
