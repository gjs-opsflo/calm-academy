<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 490" width="800" height="490" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Virgil, 'Segoe UI Emoji', cursive; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="380" y="24" font-size="18" text-anchor="middle" font-weight="bold">Conference Signup — Step 3: Complete Architecture</text>

  <!-- VALIDATED badge (top-right corner) -->
  <rect x="660" y="8" width="120" height="28" rx="4" ry="4" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <rect x="664" y="12" width="112" height="20" rx="2" ry="2" stroke="#1e1e1e" stroke-width="1" fill="#ffffff"/>
  <text x="720" y="26" font-size="12" text-anchor="middle" font-weight="bold">[VALIDATED]</text>

  <!-- k8s-cluster (system) — large dashed rect -->
  <rect x="310" y="46" width="464" height="280" rx="10" ry="10" stroke="#1e1e1e" stroke-width="2" stroke-dasharray="8,4" fill="#ffffff"/>
  <text x="360" y="64" font-size="12" fill="#757575">k8s-cluster (system)</text>

  <!-- NODE 1: conference-attendee (actor) -->
  <circle cx="58" cy="100" r="20" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <line x1="58" y1="120" x2="58" y2="158" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="34" y1="138" x2="82" y2="138" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="58" y1="158" x2="38" y2="186" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="58" y1="158" x2="78" y2="186" stroke="#1e1e1e" stroke-width="2"/>
  <text x="58" y="206" font-size="10" text-anchor="middle">conference-attendee</text>
  <text x="58" y="219" font-size="10" text-anchor="middle" fill="#757575">(actor)</text>

  <!-- NODE 2: conference-website (webclient) -->
  <rect x="130" y="76" width="140" height="86" rx="4" ry="4" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <rect x="130" y="76" width="140" height="22" rx="4" ry="4" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <line x1="130" y1="98" x2="270" y2="98" stroke="#1e1e1e" stroke-width="1.5"/>
  <circle cx="144" cy="87" r="4" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <circle cx="157" cy="87" r="4" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <rect x="168" y="81" width="62" height="12" rx="3" ry="3" stroke="#1e1e1e" stroke-width="1" fill="#ffffff"/>
  <text x="200" y="140" font-size="10" text-anchor="middle">conference-website</text>
  <text x="200" y="153" font-size="10" text-anchor="middle" fill="#757575">(webclient)</text>

  <!-- NODE 3: load-balancer (network) — cloud -->
  <path d="M355,106 Q347,90 363,86 Q367,76 377,80 Q381,68 391,72 Q401,62 409,74 Q419,68 425,82 Q437,80 439,94 Q447,96 445,108 Q445,124 431,122 Q423,132 411,126 Q403,136 391,130 Q379,140 369,132 Q353,132 355,106 Z"
        stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="397" y="152" font-size="10" text-anchor="middle">load-balancer</text>
  <text x="397" y="165" font-size="10" text-anchor="middle" fill="#757575">(network)</text>

  <!-- NODE 4: attendees (service) — hexagon -->
  <polygon points="538,86 572,104 572,140 538,158 504,140 504,104" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="538" y="126" font-size="10" text-anchor="middle">attendees</text>
  <text x="538" y="172" font-size="10" text-anchor="middle" fill="#757575">(service)</text>

  <!-- NODE 5: attendees-store (database) — cylinder -->
  <ellipse cx="686" cy="100" rx="50" ry="11" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <rect x="636" y="100" width="100" height="52" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <ellipse cx="686" cy="152" rx="50" ry="11" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="686" y="177" font-size="10" text-anchor="middle">attendees-store</text>
  <text x="686" y="190" font-size="10" text-anchor="middle" fill="#757575">(database)</text>

  <!-- RELATIONSHIPS (same as step 2) -->
  <line x1="78" y1="130" x2="130" y2="120" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="104" y="118" font-size="9" text-anchor="middle" font-style="italic">interacts</text>

  <line x1="270" y1="112" x2="350" y2="112" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="287" y="96" width="44" height="14" rx="3" ry="3" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <text x="309" y="107" font-size="9" text-anchor="middle" font-weight="bold">HTTPS</text>
  <text x="309" y="128" font-size="9" text-anchor="middle" font-style="italic">connects</text>

  <line x1="445" y1="108" x2="504" y2="116" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="456" y="94" width="40" height="14" rx="3" ry="3" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <text x="476" y="105" font-size="9" text-anchor="middle" font-weight="bold">mTLS</text>
  <text x="480" y="126" font-size="9" text-anchor="middle" font-style="italic">connects</text>

  <line x1="572" y1="122" x2="636" y2="122" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="584" y="108" width="40" height="14" rx="3" ry="3" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <text x="604" y="119" font-size="9" text-anchor="middle" font-weight="bold">JDBC</text>
  <text x="604" y="136" font-size="9" text-anchor="middle" font-style="italic">connects</text>

  <!-- deployed-in dashed lines -->
  <line x1="310" y1="140" x2="370" y2="128" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="310" y1="162" x2="504" y2="140" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="310" y1="180" x2="636" y2="155" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="325" y="190" font-size="9" fill="#757575" font-style="italic">deployed-in</text>

  <!-- ADDITION 1: Interface callout on attendees service -->
  <line x1="572" y1="120" x2="638" y2="220" stroke="#1e1e1e" stroke-width="1.5"/>
  <rect x="570" y="220" width="174" height="46" rx="4" ry="4" stroke="#1e1e1e" stroke-width="1.5" fill="#ffffff"/>
  <text x="657" y="239" font-size="11" text-anchor="middle" font-weight="bold">interface: attendees-api</text>
  <text x="657" y="257" font-size="11" text-anchor="middle">HTTPS : 8443</text>

  <!-- ADDITION 2: Control badge (architecture level) — top area near title -->
  <rect x="18" y="300" width="248" height="54" rx="4" ry="4" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <!-- Double border effect -->
  <rect x="22" y="304" width="240" height="46" rx="3" ry="3" stroke="#1e1e1e" stroke-width="1" fill="#ffffff"/>
  <text x="142" y="320" font-size="11" text-anchor="middle" font-weight="bold">control: encryption-in-transit</text>
  <text x="142" y="336" font-size="11" text-anchor="middle">TLS 1.3+</text>
  <text x="142" y="350" font-size="10" text-anchor="middle" fill="#757575">(top-level — applies to all connections)</text>

  <!-- Caption -->
  <text x="400" y="400" font-size="12" text-anchor="middle" font-style="italic">Step 3 — add the interface contract and the security control.</text>
  <text x="400" y="418" font-size="12" text-anchor="middle" font-style="italic">The architecture is now complete and validates.</text>

  <!-- Bottom annotation -->
  <rect x="18" y="436" width="764" height="40" rx="3" ry="3" stroke="#cccccc" stroke-width="1" fill="#ffffff"/>
  <text x="400" y="453" font-size="11" text-anchor="middle" fill="#757575">Interface callout = interfaces[] on attendees node. Control badge = top-level controls block.</text>
  <text x="400" y="469" font-size="11" text-anchor="middle" fill="#757575">These are visual representations — not separate CALM objects.</text>
</svg>
