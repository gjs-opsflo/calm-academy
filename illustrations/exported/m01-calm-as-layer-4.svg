<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
    <pattern id="hatch-light" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#cccccc" stroke-width="1.5"/>
    </pattern>
    <pattern id="hatch-medium" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#aaaaaa" stroke-width="1.5"/>
    </pattern>
    <pattern id="hatch-heavy" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#888888" stroke-width="1.5"/>
    </pattern>
  </defs>

  <!-- Title -->
  <text x="360" y="30" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="19" font-weight="bold" text-anchor="middle" fill="#1e1e1e">CALM as Gemara Layer 4 — The Pivot</text>

  <!-- ===== TOP ZONE: Layers 1–3 ===== -->
  <rect x="50" y="48" width="550" height="150" rx="6" fill="url(#hatch-light)" stroke="#1e1e1e" stroke-width="2"/>
  <text x="325" y="70" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e1e1e">Layers 1–3 — what the rules SAY should exist</text>
  <!-- three boxes inside top zone -->
  <rect x="68" y="82" width="160" height="38" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="148" y="97" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="11" text-anchor="middle" fill="#1e1e1e">NIST CSF /</text>
  <text x="148" y="112" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="11" text-anchor="middle" fill="#1e1e1e">MITRE ATT&amp;CK [L1]</text>

  <rect x="248" y="82" width="110" height="38" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="303" y="97" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="11" text-anchor="middle" fill="#1e1e1e">FINOS CCC [L2]</text>
  <text x="303" y="112" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="middle" fill="#555555">control catalog</text>

  <rect x="378" y="82" width="134" height="38" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="445" y="97" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="11" text-anchor="middle" fill="#1e1e1e">Org Risk Policy [L3]</text>
  <text x="445" y="112" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="middle" fill="#555555">internal rules</text>

  <!-- "feed into" arrow downward from top zone -->
  <line x1="325" y1="198" x2="325" y2="228" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="340" y="218" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="12" text-anchor="start" fill="#1e1e1e">feed into</text>

  <!-- ===== CENTRE ZONE: Layer 4 — HEAVY BORDER ===== -->
  <rect x="46" y="232" width="558" height="110" rx="6" fill="url(#hatch-medium)" stroke="#1e1e1e" stroke-width="5"/>
  <text x="325" y="256" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="15" font-weight="bold" text-anchor="middle" fill="#1e1e1e">Layer 4 — Sensitive Activities</text>
  <!-- central artifact box -->
  <rect x="175" y="266" width="300" height="38" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="2.5"/>
  <text x="325" y="280" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e1e1e">CALM Architecture</text>
  <text x="325" y="297" font-family="monospace, 'Courier New', Courier" font-size="12" text-anchor="middle" fill="#1e1e1e">(.architecture.json)</text>

  <!-- "evaluated by" arrow downward from centre zone -->
  <line x1="325" y1="342" x2="325" y2="372" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="340" y="362" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="12" text-anchor="start" fill="#1e1e1e">evaluated by</text>

  <!-- ===== BOTTOM ZONE: Layers 5–7 ===== -->
  <rect x="50" y="376" width="550" height="140" rx="6" fill="url(#hatch-heavy)" stroke="#1e1e1e" stroke-width="2"/>
  <text x="325" y="398" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e1e1e">Layers 5–7 — did we BUILD it correctly?</text>
  <!-- three boxes inside bottom zone -->
  <rect x="68" y="408" width="158" height="38" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="147" y="423" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="11" text-anchor="middle" fill="#1e1e1e">CALM Guard</text>
  <text x="147" y="438" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="11" text-anchor="middle" fill="#1e1e1e">Evaluation [L5]</text>

  <rect x="246" y="408" width="158" height="38" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="325" y="423" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="11" text-anchor="middle" fill="#1e1e1e">CALM Guard</text>
  <text x="325" y="438" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="11" text-anchor="middle" fill="#1e1e1e">Enforcement [L6]</text>

  <rect x="424" y="408" width="158" height="38" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="503" y="423" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="11" text-anchor="middle" fill="#1e1e1e">CALM Guard</text>
  <text x="503" y="438" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="11" text-anchor="middle" fill="#1e1e1e">Audit [L7]</text>

  <!-- Right side annotation -->
  <rect x="618" y="200" width="172" height="100" rx="5" fill="#f8f8f8" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="704" y="228" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e1e1e">CALM is the</text>
  <text x="704" y="245" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e1e1e">pivot point —</text>
  <text x="704" y="265" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="11" text-anchor="middle" fill="#555555">Gemara Section 8</text>
  <text x="704" y="280" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="11" text-anchor="middle" fill="#555555">calls for this schema</text>
  <text x="704" y="295" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="11" text-anchor="middle" fill="#555555">explicitly.</text>

  <!-- Caption -->
  <text x="360" y="535" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="13" text-anchor="middle" fill="#757575">CALM bridges the gap: definitions flow in, measurements flow out. Layer 4 is where governance becomes real.</text>
</svg>
