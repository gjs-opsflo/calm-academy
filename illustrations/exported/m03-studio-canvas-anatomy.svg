<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Virgil, 'Segoe UI Emoji', cursive; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="400" y="28" font-size="20" text-anchor="middle" font-weight="bold">CALM Studio canvas anatomy</text>

  <!-- Outer application window border -->
  <rect x="10" y="42" width="780" height="450" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>

  <!-- Window title bar -->
  <rect x="10" y="42" width="780" height="26" rx="4" fill="#f0f0f0" stroke="#1e1e1e" stroke-width="2"/>
  <circle cx="30" cy="55" r="6" fill="none" stroke="#1e1e1e" stroke-width="1.5"/>
  <circle cx="48" cy="55" r="6" fill="none" stroke="#1e1e1e" stroke-width="1.5"/>
  <circle cx="66" cy="55" r="6" fill="none" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="400" y="60" font-size="12" text-anchor="middle" fill="#555">CALM Studio</text>

  <!-- LEFT PANEL — Node palette (~120px wide) -->
  <rect x="10" y="68" width="120" height="380" fill="#fafafa" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Label banner -->
  <text x="70" y="84" font-size="12" text-anchor="middle" font-weight="bold">Node palette</text>
  <line x1="10" y1="90" x2="130" y2="90" stroke="#1e1e1e" stroke-width="1"/>
  <!-- Node type list -->
  <text x="70" y="108" font-size="11" text-anchor="middle">&#128100; actor</text>
  <text x="70" y="126" font-size="11" text-anchor="middle">&#9729; ecosystem</text>
  <text x="70" y="144" font-size="11" text-anchor="middle">&#9632; system</text>
  <text x="70" y="162" font-size="11" text-anchor="middle">&#11041; service</text>
  <text x="70" y="180" font-size="11" text-anchor="middle">&#9122; database</text>
  <text x="70" y="198" font-size="11" text-anchor="middle">&#127759; network</text>
  <text x="70" y="216" font-size="11" text-anchor="middle">&#128187; webclient</text>
  <text x="70" y="234" font-size="11" text-anchor="middle">&#128450; ldap</text>
  <text x="70" y="252" font-size="11" text-anchor="middle">&#128196; data-asset</text>
  <line x1="10" y1="260" x2="130" y2="260" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="70" y="278" font-size="10" text-anchor="middle" fill="#555" font-style="italic">Drag to canvas</text>

  <!-- CENTER PANEL — Canvas (~450px wide) -->
  <rect x="130" y="68" width="450" height="380" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="355" y="84" font-size="12" text-anchor="middle" font-weight="bold">Canvas</text>
  <line x1="130" y1="90" x2="580" y2="90" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Network dashed container -->
  <rect x="160" y="110" width="380" height="230" rx="6" fill="none" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="175" y="125" font-size="10" fill="#555">network</text>

  <!-- webclient node -->
  <rect x="175" y="145" width="100" height="44" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="225" y="162" font-size="11" text-anchor="middle" font-weight="bold">webclient</text>
  <text x="225" y="176" font-size="9" text-anchor="middle" fill="#555">browser</text>

  <!-- Arrow webclient → service -->
  <line x1="275" y1="167" x2="320" y2="167" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="297" y="161" font-size="9" text-anchor="middle">HTTPS</text>

  <!-- service node -->
  <!-- Hexagon approximation with polygon -->
  <polygon points="340,148 380,148 400,167 380,187 340,187 320,167" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="360" y="163" font-size="10" text-anchor="middle" font-weight="bold">service</text>
  <text x="360" y="176" font-size="8" text-anchor="middle">API</text>

  <!-- Arrow service → database -->
  <line x1="400" y1="167" x2="450" y2="200" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="432" y="185" font-size="9" text-anchor="middle">JDBC</text>

  <!-- database node -->
  <rect x="450" y="195" width="80" height="40" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="490" y="212" font-size="11" text-anchor="middle" font-weight="bold">database</text>
  <text x="490" y="226" font-size="9" text-anchor="middle" fill="#555">PostgreSQL</text>

  <!-- Canvas sub-label -->
  <text x="355" y="365" font-size="10" text-anchor="middle" fill="#555" font-style="italic">Drag, connect, arrange. Canvas&#8596;JSON sync.</text>

  <!-- RIGHT PANEL — JSON editor (~220px wide) -->
  <rect x="580" y="68" width="210" height="380" fill="#f9f9f9" stroke="#1e1e1e" stroke-width="2"/>
  <text x="685" y="84" font-size="12" text-anchor="middle" font-weight="bold">JSON code editor</text>
  <line x1="580" y1="90" x2="790" y2="90" stroke="#1e1e1e" stroke-width="1"/>
  <!-- Code snippet -->
  <text x="596" y="110" font-size="9" font-family="monospace, Courier New, monospace">{</text>
  <text x="596" y="124" font-size="9" font-family="monospace, Courier New, monospace">  "$schema": "calm/1.2",</text>
  <text x="596" y="138" font-size="9" font-family="monospace, Courier New, monospace">  "nodes": [</text>
  <text x="596" y="152" font-size="9" font-family="monospace, Courier New, monospace">    {</text>
  <text x="596" y="166" font-size="9" font-family="monospace, Courier New, monospace">      "unique-id":</text>
  <text x="596" y="180" font-size="9" font-family="monospace, Courier New, monospace">        "browser",</text>
  <text x="596" y="194" font-size="9" font-family="monospace, Courier New, monospace">      "node-type":</text>
  <text x="596" y="208" font-size="9" font-family="monospace, Courier New, monospace">        "webclient",</text>
  <text x="596" y="222" font-size="9" font-family="monospace, Courier New, monospace">      "name":</text>
  <text x="596" y="236" font-size="9" font-family="monospace, Courier New, monospace">        "Browser"</text>
  <text x="596" y="250" font-size="9" font-family="monospace, Courier New, monospace">    }</text>
  <text x="596" y="264" font-size="9" font-family="monospace, Courier New, monospace">  ]</text>
  <text x="596" y="278" font-size="9" font-family="monospace, Courier New, monospace">}</text>
  <line x1="580" y1="300" x2="790" y2="300" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="685" y="322" font-size="9" text-anchor="middle" fill="#555" font-style="italic">Edit JSON directly.</text>
  <text x="685" y="338" font-size="9" text-anchor="middle" fill="#555" font-style="italic">Canvas updates instantly.</text>

  <!-- BOTTOM STRIP — Properties panel -->
  <rect x="10" y="448" width="780" height="44" fill="#f5f5f5" stroke="#1e1e1e" stroke-width="2"/>
  <text x="90" y="463" font-size="12" font-weight="bold">Properties panel</text>
  <text x="90" y="482" font-size="10" fill="#555">name: browser  |  type: webclient  |  description: User's browser application</text>
  <text x="600" y="474" font-size="10" fill="#555" font-style="italic">Click any node or edge to inspect and edit.</text>

  <!-- Caption -->
  <text x="400" y="544" font-size="14" text-anchor="middle" fill="#757575">Module 3.2 — CALM Studio: four-zone canvas layout</text>
</svg>
