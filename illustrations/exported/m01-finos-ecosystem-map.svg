<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="20" font-weight="bold" text-anchor="middle" fill="#1e1e1e">FINOS CALM Ecosystem Map</text>

  <!-- ===== CENTRAL BOX ===== -->
  <rect x="285" y="220" width="230" height="64" rx="6" fill="#f5f5f5" stroke="#1e1e1e" stroke-width="4"/>
  <text x="400" y="246" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e1e1e">CALM Architecture</text>
  <text x="400" y="265" font-family="monospace, 'Courier New', Courier" font-size="12" text-anchor="middle" fill="#1e1e1e">(.architecture.json)</text>

  <!-- ===== SURROUNDING NODES ===== -->

  <!-- LEFT: ARB -->
  <rect x="30" y="228" width="160" height="48" rx="5" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="110" y="249" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e1e1e">ARB</text>
  <text x="110" y="267" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="middle" fill="#555555">Architectural Reference Board</text>
  <!-- ARB → CALM -->
  <line x1="190" y1="252" x2="283" y2="252" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="237" y="244" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="middle" fill="#1e1e1e">encodes as</text>

  <!-- TOP: calmstudio-mcp -->
  <rect x="292" y="80" width="216" height="48" rx="5" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="400" y="102" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="13" font-weight="bold" text-anchor="middle" fill="#1e1e1e">calmstudio-mcp</text>
  <text x="400" y="119" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="middle" fill="#555555">AI-driven creation</text>
  <!-- calmstudio-mcp → CALM -->
  <line x1="400" y1="128" x2="400" y2="218" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="416" y="176" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="start" fill="#1e1e1e">AI-driven creation</text>

  <!-- TOP-RIGHT: AIGF -->
  <rect x="580" y="80" width="200" height="48" rx="5" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="680" y="102" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e1e1e">AIGF</text>
  <text x="680" y="119" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="middle" fill="#555555">AI Governance Framework</text>
  <!-- AIGF → CALM -->
  <line x1="605" y1="128" x2="520" y2="220" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="590" y="180" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="middle" fill="#1e1e1e">auto-attaches</text>
  <text x="590" y="193" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="middle" fill="#1e1e1e">on ai:* nodes</text>

  <!-- RIGHT: CALM Hub -->
  <rect x="600" y="228" width="180" height="48" rx="5" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="690" y="249" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e1e1e">CALM Hub</text>
  <text x="690" y="267" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="middle" fill="#555555">versioned registry</text>
  <!-- CALM → CALM Hub -->
  <line x1="515" y1="252" x2="598" y2="252" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="556" y="244" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="middle" fill="#1e1e1e">published to</text>

  <!-- BOTTOM-RIGHT: CALM Studio -->
  <rect x="580" y="380" width="200" height="48" rx="5" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="680" y="401" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e1e1e">CALM Studio</text>
  <text x="680" y="419" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="middle" fill="#555555">visual canvas</text>
  <!-- CALM ↔ CALM Studio (double-headed) -->
  <line x1="510" y1="284" x2="590" y2="380" stroke="#1e1e1e" stroke-width="2" marker-start="url(#arr2)" marker-end="url(#arr)"/>
  <text x="575" y="338" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="middle" fill="#1e1e1e">bidirectional sync</text>

  <!-- BOTTOM-CENTER: CALM CLI -->
  <rect x="286" y="390" width="228" height="48" rx="5" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="400" y="411" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e1e1e">CALM CLI</text>
  <text x="400" y="428" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="middle" fill="#555555">validate / diff / docify</text>
  <!-- CALM → CLI -->
  <line x1="400" y1="284" x2="400" y2="388" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="416" y="334" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="start" fill="#1e1e1e">consumed by</text>

  <!-- BOTTOM-LEFT: CALM Guard -->
  <rect x="30" y="380" width="180" height="48" rx="5" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="120" y="401" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e1e1e">CALM Guard</text>
  <text x="120" y="419" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="middle" fill="#555555">AI-driven compliance</text>
  <!-- CALM Guard → CALM Hub (via hub) -->
  <line x1="210" y1="395" x2="597" y2="280" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="380" y="360" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" text-anchor="middle" fill="#555555">pulls from Hub, validates</text>

  <!-- OpenSSF Gemara annotation strip (far right) -->
  <rect x="725" y="218" width="70" height="72" rx="4" fill="#f5f5f5" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="760" y="252" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" font-weight="bold" text-anchor="middle" fill="#1e1e1e">OpenSSF</text>
  <text x="760" y="266" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="10" font-weight="bold" text-anchor="middle" fill="#1e1e1e">Gemara</text>
  <text x="760" y="280" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="9" text-anchor="middle" fill="#555555">CALM at L4</text>

  <!-- Caption -->
  <text x="400" y="476" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="13" text-anchor="middle" fill="#757575">CALM Architecture is the gravitational centre of the FINOS AaC ecosystem.</text>
  <text x="400" y="500" font-family="Virgil, 'Segoe UI Emoji', cursive" font-size="13" text-anchor="middle" fill="#757575">Every tool orbits it — creating, validating, publishing, or enforcing it.</text>
</svg>
