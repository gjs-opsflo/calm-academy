<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 760" width="800" height="760" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
    <marker id="arr-d" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Virgil, 'Segoe UI Emoji', cursive; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="400" y="30" font-size="20" text-anchor="middle" font-weight="bold">Full CALM Hub-Integrated Pipeline</text>

  <!-- Right-side annotation (rotated text) -->
  <text x="790" y="400" font-size="10" text-anchor="middle" fill="#555" transform="rotate(90,790,400)" font-style="italic">Architecture is code. It gets the same pipeline as app code.</text>

  <!-- Pipeline centre x=310 -->

  <!-- ===== Step 1: PR opened ===== -->
  <rect x="220" y="50" width="180" height="56" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="310" y="74" font-size="14" text-anchor="middle" font-weight="bold">PR opened</text>
  <text x="310" y="94" font-size="10" text-anchor="middle" fill="#555">developer pushes architecture update</text>

  <!-- Arrow 1→2 -->
  <line x1="310" y1="106" x2="310" y2="132" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== Step 2: calm validate (Gate 1) ===== -->
  <!-- Diamond gate marker (left) -->
  <polygon points="160,160 185,145 210,160 185,175" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="185" y="164" font-size="8" text-anchor="middle">Gate 1</text>
  <line x1="210" y1="160" x2="220" y2="160" stroke="#1e1e1e" stroke-width="1.5"/>

  <rect x="220" y="132" width="180" height="56" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="310" y="154" font-size="14" text-anchor="middle" font-weight="bold">calm validate</text>
  <text x="310" y="172" font-size="10" text-anchor="middle" fill="#555">arch vs Hub-hosted pattern</text>

  <!-- Fail path right (dashed) -->
  <line x1="400" y1="160" x2="470" y2="160" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-d)"/>
  <rect x="470" y="143" width="140" height="34" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="540" y="164" font-size="10" text-anchor="middle">blocked — PR cannot merge</text>

  <!-- Arrow 2→3 -->
  <line x1="310" y1="188" x2="310" y2="214" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== Step 3: calm diff (Gate 2) ===== -->
  <!-- Diamond gate marker (left) -->
  <polygon points="160,242 185,227 210,242 185,257" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="185" y="246" font-size="8" text-anchor="middle">Gate 2</text>
  <line x1="210" y1="242" x2="220" y2="242" stroke="#1e1e1e" stroke-width="1.5"/>

  <rect x="220" y="214" width="180" height="56" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="310" y="236" font-size="14" text-anchor="middle" font-weight="bold">calm diff</text>
  <text x="310" y="254" font-size="10" text-anchor="middle" fill="#555">PR version vs Hub-published version</text>

  <!-- Output path right -->
  <line x1="400" y1="242" x2="470" y2="242" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-d)"/>
  <rect x="470" y="225" width="140" height="34" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="540" y="246" font-size="10" text-anchor="middle">summary in PR comments</text>

  <!-- Arrow 3→4 -->
  <line x1="310" y1="270" x2="310" y2="296" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== Step 4: Tests pass ===== -->
  <rect x="220" y="296" width="180" height="56" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="310" y="318" font-size="14" text-anchor="middle" font-weight="bold">Tests pass</text>
  <text x="310" y="336" font-size="10" text-anchor="middle" fill="#555">application tests run in parallel</text>

  <!-- Parallel note -->
  <rect x="476" y="305" width="126" height="38" rx="4" fill="#f5f5f5" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="539" y="321" font-size="9" text-anchor="middle" fill="#555">&#9478; parallel track</text>
  <text x="539" y="335" font-size="9" text-anchor="middle" fill="#555">&#9478; unit/integration</text>
  <line x1="400" y1="324" x2="476" y2="324" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Arrow 4→5 -->
  <line x1="310" y1="352" x2="310" y2="378" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== Step 5: PR merged ===== -->
  <rect x="220" y="378" width="180" height="56" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="310" y="400" font-size="14" text-anchor="middle" font-weight="bold">PR merged</text>
  <text x="310" y="418" font-size="10" text-anchor="middle" fill="#555">arch + app code merge to main</text>

  <!-- Arrow 5→6 -->
  <line x1="310" y1="434" x2="310" y2="460" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== Step 6: calm hub push (HEAVY BORDER) ===== -->
  <rect x="210" y="460" width="200" height="64" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="4"/>
  <text x="310" y="484" font-size="14" text-anchor="middle" font-weight="bold">calm hub push</text>
  <text x="310" y="502" font-size="10" text-anchor="middle" fill="#555">new architecture version published</text>
  <text x="310" y="516" font-size="9" text-anchor="middle" fill="#777">Hub now holds the new canonical version</text>

  <!-- Arrow 6→7 split -->
  <line x1="310" y1="524" x2="310" y2="548" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="165" y1="548" x2="455" y2="548" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="165" y1="548" x2="165" y2="566" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="455" y1="548" x2="455" y2="566" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== Step 7A: CALM Guard track ===== -->
  <rect x="68" y="566" width="194" height="56" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="165" y="588" font-size="13" text-anchor="middle" font-weight="bold">CALM Guard</text>
  <text x="165" y="606" font-size="9" text-anchor="middle" fill="#555">pulls from Hub &#8594; compliance check</text>

  <line x1="165" y1="622" x2="165" y2="644" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="80" y="644" width="170" height="38" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="165" y="661" font-size="10" text-anchor="middle">alert if non-compliant</text>
  <text x="165" y="675" font-size="9" text-anchor="middle" fill="#555">evidence package generated</text>

  <!-- ===== Step 7B: Terraform / IaC track ===== -->
  <rect x="358" y="566" width="194" height="56" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="455" y="588" font-size="13" text-anchor="middle" font-weight="bold">Terraform / IaC</text>
  <text x="455" y="606" font-size="9" text-anchor="middle" fill="#555">applies infrastructure to match arch</text>

  <line x1="455" y1="622" x2="455" y2="644" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="380" y="644" width="150" height="38" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="455" y="661" font-size="12" text-anchor="middle" font-weight="bold">Deploy</text>
  <text x="455" y="675" font-size="9" text-anchor="middle" fill="#555">infrastructure matches architecture</text>

  <!-- Bottom caption box -->
  <rect x="100" y="700" width="600" height="42" rx="6" fill="#f5f5f5" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="400" y="718" font-size="11" text-anchor="middle" font-weight="bold">No merge without valid architecture.</text>
  <text x="400" y="734" font-size="11" text-anchor="middle" font-weight="bold">No deploy without Hub-published architecture.</text>

  <!-- Caption -->
  <text x="400" y="754" font-size="14" text-anchor="middle" fill="#757575">Module 3.7 — Full CALM Hub-Integrated Pipeline: 7 steps</text>
</svg>
