<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Inter, system-ui, sans-serif; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="400" y="30" font-size="20" text-anchor="middle" font-weight="bold">Validation as a service vs local CLI</text>

  <!-- ===== TRACK 1: Local CLI ===== -->
  <!-- Track label box -->
  <rect x="10" y="44" width="780" height="175" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="20" y="64" font-size="13" font-weight="bold">Track A — Local CLI</text>
  <line x1="10" y1="70" x2="790" y2="70" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Developer stick figure -->
  <circle cx="80" cy="108" r="16" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="80" y1="124" x2="80" y2="162" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="55" y1="138" x2="105" y2="138" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="80" y1="162" x2="60" y2="185" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="80" y1="162" x2="100" y2="185" stroke="#1e1e1e" stroke-width="2"/>
  <text x="80" y="200" font-size="12" text-anchor="middle" font-weight="bold">Developer</text>

  <!-- Arrow: Developer → CLI run -->
  <line x1="115" y1="138" x2="235" y2="138" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="175" y="124" font-size="9" text-anchor="middle" font-family="monospace">calm validate</text>
  <text x="175" y="136" font-size="9" text-anchor="middle" font-family="monospace">-a arch.calm.json</text>
  <text x="175" y="156" font-size="9" text-anchor="middle" fill="#555">runs locally</text>

  <!-- Terminal output box -->
  <rect x="235" y="98" width="160" height="72" rx="4" fill="#1e1e1e" stroke="#1e1e1e" stroke-width="2"/>
  <text x="315" y="118" font-size="11" text-anchor="middle" fill="#ffffff" font-family="monospace">$ calm validate</text>
  <text x="315" y="136" font-size="11" text-anchor="middle" fill="#ffffff" font-family="monospace">&#10003; 0 errors</text>
  <text x="315" y="154" font-size="11" text-anchor="middle" fill="#ffffff" font-family="monospace">exit code: 0</text>

  <!-- Note -->
  <text x="415" y="112" font-size="11" fill="#555">Works on developer machine only.</text>
  <text x="415" y="130" font-size="11" fill="#555">CLI must be installed per machine.</text>
  <text x="415" y="148" font-size="11" fill="#555">Schema version tied to CLI version.</text>
  <text x="415" y="166" font-size="11" fill="#555">No central audit trail of validations.</text>

  <!-- ===== DIVIDER ===== -->
  <line x1="10" y1="229" x2="790" y2="229" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="8,5"/>
  <rect x="360" y="219" width="80" height="22" rx="4" fill="#ffffff" stroke="#1e1e1e" stroke-width="1"/>
  <text x="400" y="235" font-size="14" text-anchor="middle" font-weight="bold">vs</text>

  <!-- ===== TRACK 2: CALM Server ===== -->
  <rect x="10" y="241" width="780" height="200" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="20" y="262" font-size="13" font-weight="bold">Track B — CALM Server (Platform Pattern)</text>
  <line x1="10" y1="268" x2="790" y2="268" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Dev Team 1 stick figure -->
  <circle cx="70" cy="298" r="13" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="70" y1="311" x2="70" y2="338" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="50" y1="322" x2="90" y2="322" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="70" y1="338" x2="55" y2="358" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="70" y1="338" x2="85" y2="358" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="70" y="374" font-size="11" text-anchor="middle">Dev Team 1</text>

  <!-- Dev Team 2 stick figure -->
  <circle cx="70" cy="398" r="13" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="70" y1="411" x2="70" y2="432" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="50" y1="420" x2="90" y2="420" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="70" y1="432" x2="55" y2="452" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="70" y1="432" x2="85" y2="452" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="70" y="464" font-size="11" text-anchor="middle">Dev Team 2</text>

  <!-- Arrows: teams → calm-server -->
  <line x1="100" y1="318" x2="238" y2="360" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="100" y1="412" x2="238" y2="375" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="170" y="336" font-size="9" text-anchor="middle" font-family="monospace">POST /calm/validate</text>
  <text x="170" y="394" font-size="9" text-anchor="middle" font-family="monospace">POST /calm/validate</text>

  <!-- calm-server box -->
  <rect x="238" y="318" width="180" height="90" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="3"/>
  <text x="328" y="342" font-size="14" text-anchor="middle" font-weight="bold">calm-server</text>
  <text x="328" y="360" font-size="10" text-anchor="middle">port 3000</text>
  <text x="328" y="378" font-size="9" text-anchor="middle" fill="#555">Platform team controls</text>
  <text x="328" y="392" font-size="9" text-anchor="middle" fill="#555">schema version</text>

  <!-- Arrow: calm-server → response -->
  <line x1="418" y1="363" x2="518" y2="363" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="468" y="350" font-size="9" text-anchor="middle" font-family="monospace">{"hasErrors":</text>
  <text x="468" y="362" font-size="9" text-anchor="middle" font-family="monospace">false}</text>

  <!-- Response box -->
  <rect x="518" y="340" width="120" height="46" rx="4" fill="#f5f5f5" stroke="#1e1e1e" stroke-width="2"/>
  <text x="578" y="360" font-size="14" text-anchor="middle">&#10003; valid</text>
  <text x="578" y="378" font-size="10" text-anchor="middle" fill="#555">JSON response</text>

  <!-- Annotations -->
  <text x="660" y="310" font-size="10" fill="#555">Rate limiting: 100 req/15min</text>
  <text x="660" y="328" font-size="10" fill="#555">No CLI install per dev team</text>
  <text x="660" y="346" font-size="10" fill="#555">Central schema governance</text>
  <text x="660" y="364" font-size="10" fill="#555">Audit trail in server logs</text>

  <!-- Platform Admin -->
  <circle cx="656" cy="418" r="12" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="656" y1="430" x2="656" y2="452" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="640" y1="440" x2="672" y2="440" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="656" y="468" font-size="10" text-anchor="middle">Platform Admin</text>
  <line x1="620" y1="440" x2="420" y2="405" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="524" y="426" font-size="9" text-anchor="middle" fill="#555">manages</text>

  <!-- Caption -->
  <text x="400" y="490" font-size="14" text-anchor="middle" fill="#757575">Module 3.4 — CALM Server: shared validation API vs per-machine CLI</text>
</svg>
