<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Inter, system-ui, sans-serif; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="400" y="28" font-size="19" text-anchor="middle" font-weight="bold">CALM Tools for VS Code — 4 panels in one editor</text>

  <!-- Outer window frame -->
  <rect x="10" y="42" width="780" height="440" rx="4" fill="#1e1e1e" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="10" y="42" width="780" height="24" rx="4" fill="#333333" stroke="#1e1e1e" stroke-width="2"/>
  <circle cx="30" cy="54" r="5" fill="none" stroke="#aaa" stroke-width="1"/>
  <circle cx="46" cy="54" r="5" fill="none" stroke="#aaa" stroke-width="1"/>
  <circle cx="62" cy="54" r="5" fill="none" stroke="#aaa" stroke-width="1"/>
  <text x="400" y="59" font-size="11" text-anchor="middle" fill="#cccccc">arch.calm.json — VS Code</text>

  <!-- ===== LEFT SIDEBAR: CALM Tree View (~90px) ===== -->
  <rect x="10" y="66" width="110" height="370" fill="#252525" stroke="#444" stroke-width="1"/>
  <text x="65" y="83" font-size="10" text-anchor="middle" fill="#cccccc" font-weight="bold">CALM EXPLORER</text>
  <line x1="10" y1="88" x2="120" y2="88" stroke="#444" stroke-width="1"/>
  <!-- Tree entries -->
  <text x="18" y="108" font-size="9" fill="#cccccc">&#9660; Nodes (5)</text>
  <text x="28" y="124" font-size="9" fill="#9cdcfe">  &#9632; browser</text>
  <text x="28" y="138" font-size="9" fill="#9cdcfe">  &#9632; api-gw</text>
  <text x="28" y="152" font-size="9" fill="#9cdcfe">  &#9632; svc-order</text>
  <text x="28" y="166" font-size="9" fill="#9cdcfe">  ...</text>
  <text x="18" y="184" font-size="9" fill="#cccccc">&#9654; Relationships (4)</text>
  <text x="18" y="200" font-size="9" fill="#cccccc">&#9654; Flows (1)</text>
  <line x1="10" y1="215" x2="120" y2="215" stroke="#444" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="65" y="230" font-size="8" text-anchor="middle" fill="#777">Browse structure</text>

  <!-- ===== CENTER EDITOR: JSON editor (~380px) ===== -->
  <rect x="120" y="66" width="390" height="370" fill="#1e1e1e" stroke="#444" stroke-width="1"/>
  <!-- Tab bar -->
  <rect x="120" y="66" width="140" height="22" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
  <text x="190" y="81" font-size="10" text-anchor="middle" fill="#cccccc">arch.calm.json &#10005;</text>
  <!-- Line numbers + code -->
  <text x="130" y="108" font-size="9" fill="#555" font-family="monospace">1</text>
  <text x="148" y="108" font-size="9" fill="#ce9178" font-family="monospace">{</text>
  <text x="130" y="122" font-size="9" fill="#555" font-family="monospace">2</text>
  <text x="148" y="122" font-size="9" fill="#9cdcfe" font-family="monospace">  "$schema":</text>
  <text x="238" y="122" font-size="9" fill="#ce9178" font-family="monospace"> "calm/1.2",</text>
  <text x="130" y="136" font-size="9" fill="#555" font-family="monospace">3</text>
  <text x="148" y="136" font-size="9" fill="#9cdcfe" font-family="monospace">  "nodes": [</text>
  <text x="130" y="150" font-size="9" fill="#555" font-family="monospace">4</text>
  <text x="148" y="150" font-size="9" fill="#ce9178" font-family="monospace">    {</text>
  <text x="130" y="164" font-size="9" fill="#555" font-family="monospace">5</text>
  <text x="148" y="164" font-size="9" fill="#9cdcfe" font-family="monospace">      "unique-id": "waf",</text>
  <text x="130" y="178" font-size="9" fill="#555" font-family="monospace">6</text>
  <text x="148" y="178" font-size="9" fill="#9cdcfe" font-family="monospace">      "name": "WAF",</text>
  <!-- Line 7 with squiggly underline (missing node-type) -->
  <text x="130" y="192" font-size="9" fill="#555" font-family="monospace">7</text>
  <text x="148" y="192" font-size="9" fill="#9cdcfe" font-family="monospace">      "description": "..."</text>
  <!-- Squiggly underline simulation -->
  <path d="M148,194 Q154,197 160,194 Q166,191 172,194 Q178,197 184,194 Q190,191 196,194 Q202,197 208,194 Q214,191 220,194 Q226,197 232,194 Q238,191 244,194 Q250,197 256,194 Q262,191 268,194 Q274,197 280,194 Q286,191 292,194 Q298,197 304,194" fill="none" stroke="#f44747" stroke-width="1"/>
  <text x="130" y="206" font-size="9" fill="#555" font-family="monospace">8</text>
  <text x="148" y="206" font-size="9" fill="#ce9178" font-family="monospace">    }</text>
  <text x="130" y="220" font-size="9" fill="#555" font-family="monospace">9</text>
  <text x="148" y="220" font-size="9" fill="#ce9178" font-family="monospace">  ]</text>
  <text x="130" y="234" font-size="9" fill="#555" font-family="monospace">10</text>
  <text x="148" y="234" font-size="9" fill="#ce9178" font-family="monospace">}</text>

  <!-- Tooltip for squiggly -->
  <rect x="148" y="198" width="210" height="18" rx="3" fill="#252525" stroke="#f44747" stroke-width="0.5"/>
  <text x="153" y="211" font-size="8" fill="#f44747" font-family="monospace">node-type is required (missing field)</text>

  <text x="310" y="415" font-size="9" text-anchor="middle" fill="#777" font-style="italic">Edit CALM JSON — errors highlighted inline</text>

  <!-- ===== RIGHT PANEL: Preview Panel (~280px) ===== -->
  <rect x="510" y="66" width="280" height="370" fill="#252525" stroke="#444" stroke-width="1"/>
  <!-- Tab bar -->
  <rect x="510" y="66" width="180" height="22" fill="#2d2d2d" stroke="#444" stroke-width="1"/>
  <text x="600" y="81" font-size="10" text-anchor="middle" fill="#cccccc">Preview &#x2022; Auto Layout</text>
  <!-- Mini diagram nodes -->
  <rect x="590" y="110" width="90" height="34" rx="4" fill="#ffffff" stroke="#cccccc" stroke-width="1.5"/>
  <text x="635" y="131" font-size="9" text-anchor="middle" fill="#1e1e1e">browser</text>
  <line x1="635" y1="144" x2="635" y2="168" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="590" y="168" width="90" height="34" rx="4" fill="#ffffff" stroke="#cccccc" stroke-width="1.5"/>
  <text x="635" y="189" font-size="9" text-anchor="middle" fill="#1e1e1e">api-gateway</text>
  <line x1="635" y1="202" x2="635" y2="226" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="590" y="226" width="90" height="34" rx="4" fill="#ffffff" stroke="#f44747" stroke-width="1.5"/>
  <text x="635" y="247" font-size="9" text-anchor="middle" fill="#1e1e1e">WAF &#9888;</text>
  <!-- Auto Layout button -->
  <rect x="680" y="94" width="96" height="22" rx="4" fill="#3a3a3a" stroke="#666" stroke-width="1"/>
  <text x="728" y="109" font-size="9" text-anchor="middle" fill="#cccccc">Auto Layout</text>
  <text x="650" y="415" font-size="9" text-anchor="middle" fill="#777" font-style="italic">Live diagram — click to inspect</text>

  <!-- ===== BOTTOM STRIP: Problems panel ===== -->
  <rect x="10" y="436" width="780" height="46" fill="#252525" stroke="#444" stroke-width="1"/>
  <text x="20" y="453" font-size="10" fill="#cccccc" font-weight="bold">PROBLEMS</text>
  <line x1="10" y1="458" x2="790" y2="458" stroke="#444" stroke-width="1"/>
  <!-- Error row -->
  <text x="20" y="474" font-size="9" fill="#f44747" font-family="monospace">&#9679;</text>
  <text x="32" y="474" font-size="9" fill="#cccccc" font-family="monospace">arch.calm.json</text>
  <text x="130" y="474" font-size="9" fill="#cccccc" font-family="monospace">line 7</text>
  <text x="168" y="474" font-size="9" fill="#cccccc" font-family="monospace">Property 'node-type' is required at nodes[0]</text>
  <text x="20" y="487" font-size="8" fill="#777">Click to navigate  |  1 error, 0 warnings</text>

  <!-- Panel labels (external) -->
  <text x="65" y="506" font-size="11" text-anchor="middle">CALM Tree View</text>
  <text x="310" y="506" font-size="11" text-anchor="middle">JSON editor</text>
  <text x="650" y="506" font-size="11" text-anchor="middle">Preview panel</text>
  <text x="400" y="520" font-size="11" text-anchor="middle">Problems panel (bottom strip)</text>

  <!-- Caption -->
  <text x="400" y="546" font-size="14" text-anchor="middle" fill="#757575">Module 3.5 — CALM Tools for VS Code: Tree View, JSON editor, Preview, Problems</text>
</svg>
