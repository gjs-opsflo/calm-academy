<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Inter, system-ui, sans-serif; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="400" y="30" font-size="19" text-anchor="middle" font-weight="bold">system vs service vs ecosystem</text>

  <!-- Panel dividers -->
  <line x1="267" y1="44" x2="267" y2="430" stroke="#cccccc" stroke-width="1.5"/>
  <line x1="533" y1="44" x2="533" y2="430" stroke="#cccccc" stroke-width="1.5"/>

  <!-- ===== PANEL 1: system ===== -->
  <text x="134" y="60" font-size="16" text-anchor="middle" font-weight="bold">system</text>
  <text x="134" y="78" font-size="12" text-anchor="middle" fill="#757575">What is this logically made of?</text>

  <!-- Solid rounded rect (thick border) -->
  <rect x="28" y="88" width="216" height="188" rx="8" ry="8" stroke="#1e1e1e" stroke-width="3" fill="#ffffff"/>

  <!-- Two small hexagons inside system -->
  <polygon points="88,120 115,136 115,168 88,184 61,168 61,136" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="88" y="157" font-size="11" text-anchor="middle">service-a</text>
  <polygon points="184,120 211,136 211,168 184,184 157,168 157,136" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="184" y="157" font-size="11" text-anchor="middle">service-b</text>

  <text x="134" y="300" font-size="13" text-anchor="middle">a logical boundary / domain</text>
  <text x="134" y="320" font-size="12" text-anchor="middle" fill="#757575">composed-of its parts</text>

  <!-- ===== PANEL 2: service ===== -->
  <text x="400" y="60" font-size="16" text-anchor="middle" font-weight="bold">service</text>
  <text x="400" y="78" font-size="12" text-anchor="middle" fill="#757575">What runs and serves requests?</text>

  <!-- Single hexagon -->
  <polygon points="400,98 448,124 448,176 400,202 352,176 352,124" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="400" y="155" font-size="13" text-anchor="middle">my-service</text>

  <text x="400" y="300" font-size="13" text-anchor="middle">a running process</text>
  <text x="400" y="319" font-size="13" text-anchor="middle">exposing capabilities</text>
  <text x="400" y="340" font-size="12" text-anchor="middle" fill="#757575">connects to other services</text>

  <!-- ===== PANEL 3: ecosystem ===== -->
  <text x="667" y="60" font-size="16" text-anchor="middle" font-weight="bold">ecosystem</text>
  <text x="667" y="78" font-size="12" text-anchor="middle" fill="#757575">Where does this run?</text>

  <!-- Dashed rounded rect -->
  <rect x="553" y="88" width="228" height="188" rx="8" ry="8" stroke="#1e1e1e" stroke-width="2" stroke-dasharray="8,4" fill="#ffffff"/>

  <!-- Two small hexagons inside ecosystem -->
  <polygon points="620,120 647,136 647,168 620,184 593,168 593,136" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="620" y="157" font-size="11" text-anchor="middle">service-a</text>
  <polygon points="714,120 741,136 741,168 714,184 687,168 687,136" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="714" y="157" font-size="11" text-anchor="middle">service-b</text>

  <text x="667" y="300" font-size="13" text-anchor="middle">a runtime environment</text>
  <text x="667" y="320" font-size="12" text-anchor="middle" fill="#757575">services are deployed-in it</text>

  <!-- Bottom annotation -->
  <rect x="18" y="360" width="764" height="60" rx="6" ry="6" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3" fill="#ffffff"/>
  <text x="400" y="384" font-size="13" text-anchor="middle">Choose based on what you mean: boundary (system),</text>
  <text x="400" y="403" font-size="13" text-anchor="middle">process (service), or runtime (ecosystem).</text>
</svg>
