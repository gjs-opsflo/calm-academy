<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Virgil, 'Segoe UI Emoji', cursive; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="400" y="30" font-size="19" text-anchor="middle" font-weight="bold">Control Anatomy</text>

  <!-- BOX 1: controls (top) -->
  <rect x="260" y="50" width="280" height="50" rx="5" ry="5" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="400" y="71" font-size="15" text-anchor="middle" font-weight="bold">controls</text>
  <text x="400" y="89" font-size="11" text-anchor="middle" fill="#757575">the control map (keyed object)</text>

  <!-- Arrow down -->
  <line x1="400" y1="100" x2="400" y2="130" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- BOX 2: encryption-in-transit (key) -->
  <rect x="230" y="130" width="340" height="50" rx="5" ry="5" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="400" y="151" font-size="14" text-anchor="middle" font-weight="bold">encryption-in-transit</text>
  <text x="400" y="169" font-size="11" text-anchor="middle" fill="#757575">the control key (kebab-case string)</text>

  <!-- Arrow down -->
  <line x1="400" y1="180" x2="400" y2="210" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- BOX 3: split — description left, requirements right -->
  <!-- Outer wrapper -->
  <rect x="50" y="210" width="700" height="90" rx="5" ry="5" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <!-- Middle divider -->
  <line x1="400" y1="210" x2="400" y2="300" stroke="#cccccc" stroke-width="1"/>

  <!-- Left: description -->
  <text x="225" y="234" font-size="11" text-anchor="middle" font-weight="bold">description:</text>
  <text x="225" y="252" font-size="10" text-anchor="middle">"All connections must use</text>
  <text x="225" y="266" font-size="10" text-anchor="middle">TLS 1.3 or higher"</text>
  <text x="225" y="288" font-size="10" text-anchor="middle" fill="#757575">human-readable explanation</text>

  <!-- Right: requirements[] -->
  <text x="575" y="234" font-size="11" text-anchor="middle" font-weight="bold">requirements[ ]</text>
  <text x="575" y="255" font-size="10" text-anchor="middle">array of requirement objects</text>
  <text x="575" y="275" font-size="10" text-anchor="middle" fill="#757575">machine-readable requirements</text>

  <!-- Arrows from requirements[] to boxes below -->
  <line x1="540" y1="300" x2="300" y2="356" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="300" x2="600" y2="356" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- BOX 4a: requirement-url -->
  <rect x="50" y="356" width="428" height="72" rx="5" ry="5" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="264" y="378" font-size="11" text-anchor="middle" font-weight="bold">requirement-url:</text>
  <text x="264" y="394" font-size="10" text-anchor="middle">"https://example.com/security/</text>
  <text x="264" y="408" font-size="10" text-anchor="middle">  encryption-in-transit.json"</text>
  <!-- Right annotation -->
  <text x="530" y="376" font-size="11" fill="#757575">the schema —</text>
  <text x="530" y="392" font-size="11" fill="#757575">what the requirement</text>
  <text x="530" y="408" font-size="11" fill="#757575">EXPECTS</text>

  <!-- BOX 4b: config -->
  <rect x="50" y="452" width="428" height="88" rx="5" ry="5" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="264" y="474" font-size="11" text-anchor="middle" font-weight="bold">config:</text>
  <text x="264" y="492" font-size="10" text-anchor="middle">{ protocol: "TLS",</text>
  <text x="264" y="508" font-size="10" text-anchor="middle">  minimumVersion: "1.3",</text>
  <text x="264" y="524" font-size="10" text-anchor="middle">  certificateValidation: "required" }</text>
  <!-- Arrow from right to config -->
  <text x="530" y="472" font-size="11" fill="#757575">the implementation —</text>
  <text x="530" y="488" font-size="11" fill="#757575">what THIS architecture</text>
  <text x="530" y="504" font-size="11" fill="#757575">provides</text>
  <line x1="526" y1="466" x2="478" y2="490" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Bottom annotation -->
  <rect x="18" y="562" width="764" height="28" rx="4" ry="4" stroke="#cccccc" stroke-width="1" fill="#ffffff"/>
  <text x="400" y="581" font-size="11" text-anchor="middle" fill="#757575">requirement-url = the standard. config = this system's answer. Tools validate config against the schema at requirement-url.</text>
</svg>
