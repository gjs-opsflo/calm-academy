<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Inter, system-ui, sans-serif; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="400" y="30" font-size="20" text-anchor="middle" font-weight="bold">Hub publish-consume workflow</text>

  <!-- ===== Step 1: Architect ===== -->
  <!-- Person icon -->
  <circle cx="70" cy="95" r="18" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="70" y1="113" x2="70" y2="158" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="40" y1="130" x2="100" y2="130" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="70" y1="158" x2="50" y2="185" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="70" y1="158" x2="90" y2="185" stroke="#1e1e1e" stroke-width="2"/>
  <text x="70" y="205" font-size="13" text-anchor="middle" font-weight="bold">Architect</text>
  <text x="70" y="222" font-size="10" text-anchor="middle" fill="#555">Creates/updates</text>
  <text x="70" y="236" font-size="10" text-anchor="middle" fill="#555">architecture locally</text>
  <text x="70" y="250" font-size="10" text-anchor="middle" fill="#555">(CLI or Studio)</text>

  <!-- Arrow 1: Architect → Hub -->
  <line x1="118" y1="148" x2="228" y2="148" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="173" y="136" font-size="9" text-anchor="middle" font-family="monospace">calm hub push</text>
  <text x="173" y="148" font-size="9" text-anchor="middle" font-family="monospace">architecture v2.0.0</text>
  <text x="173" y="166" font-size="9" text-anchor="middle" fill="#555">publish</text>

  <!-- ===== Step 2: CALM Hub ===== -->
  <rect x="228" y="108" width="150" height="80" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="3"/>
  <text x="303" y="134" font-size="14" text-anchor="middle" font-weight="bold">CALM Hub</text>
  <text x="303" y="152" font-size="9" text-anchor="middle">Stores version history</text>
  <text x="303" y="166" font-size="9" text-anchor="middle">Namespace-scoped</text>
  <text x="303" y="180" font-size="9" text-anchor="middle">Diffs preserved</text>

  <!-- Arrow 2: Hub → Product Team -->
  <line x1="378" y1="148" x2="488" y2="148" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="433" y="133" font-size="9" text-anchor="middle" font-family="monospace">calm hub pull</text>
  <text x="433" y="145" font-size="9" text-anchor="middle" font-family="monospace">architecture</text>
  <text x="433" y="165" font-size="9" text-anchor="middle" fill="#555">consume</text>

  <!-- ===== Step 3: Product Team ===== -->
  <!-- Three stick figures -->
  <circle cx="500" cy="84" r="12" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="500" y1="96" x2="500" y2="124" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="480" y1="108" x2="520" y2="108" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="500" y1="124" x2="486" y2="144" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="500" y1="124" x2="514" y2="144" stroke="#1e1e1e" stroke-width="1.5"/>
  <circle cx="525" cy="90" r="10" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="525" y1="100" x2="525" y2="124" stroke="#1e1e1e" stroke-width="1.5"/>
  <circle cx="474" cy="90" r="10" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5"/>
  <line x1="474" y1="100" x2="474" y2="124" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="500" y="165" font-size="13" text-anchor="middle" font-weight="bold">Product Team</text>
  <text x="500" y="183" font-size="10" text-anchor="middle" fill="#555">References Hub artifact</text>
  <text x="500" y="197" font-size="10" text-anchor="middle" fill="#555">by namespace + version</text>

  <!-- Arrow 3: Product Team → CI/CD -->
  <line x1="548" y1="148" x2="638" y2="148" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="593" y="130" font-size="8" text-anchor="middle" font-family="monospace">calm validate</text>
  <text x="593" y="142" font-size="8" text-anchor="middle" font-family="monospace">-a arch.calm.json</text>
  <text x="593" y="154" font-size="8" text-anchor="middle" font-family="monospace">-p hub-pattern-url</text>
  <text x="593" y="168" font-size="9" text-anchor="middle" fill="#555">validate</text>

  <!-- ===== Step 4: CI/CD Pipeline ===== -->
  <rect x="638" y="108" width="142" height="80" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="709" y="130" font-size="13" text-anchor="middle" font-weight="bold">CI/CD Pipeline</text>
  <text x="709" y="148" font-size="9" text-anchor="middle">Gate: arch must conform</text>
  <text x="709" y="162" font-size="9" text-anchor="middle">Exit 0 = merge allowed</text>
  <text x="709" y="176" font-size="9" text-anchor="middle">Exit 1 = PR blocked</text>

  <!-- Step numbers -->
  <circle cx="70" cy="60" r="12" fill="#1e1e1e" stroke="#1e1e1e" stroke-width="1"/>
  <text x="70" y="65" font-size="11" text-anchor="middle" fill="#ffffff" font-weight="bold">1</text>
  <circle cx="303" cy="60" r="12" fill="#1e1e1e" stroke="#1e1e1e" stroke-width="1"/>
  <text x="303" y="65" font-size="11" text-anchor="middle" fill="#ffffff" font-weight="bold">2</text>
  <circle cx="500" cy="60" r="12" fill="#1e1e1e" stroke="#1e1e1e" stroke-width="1"/>
  <text x="500" y="65" font-size="11" text-anchor="middle" fill="#ffffff" font-weight="bold">3</text>
  <circle cx="709" cy="60" r="12" fill="#1e1e1e" stroke="#1e1e1e" stroke-width="1"/>
  <text x="709" y="65" font-size="11" text-anchor="middle" fill="#ffffff" font-weight="bold">4</text>

  <!-- Bottom annotation box -->
  <rect x="40" y="310" width="720" height="60" rx="6" fill="#f5f5f5" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="332" font-size="11" text-anchor="middle" font-weight="bold">Version pinning</text>
  <text x="400" y="350" font-size="10" text-anchor="middle">Teams reference artifacts by namespace + version. Breaking changes require a new version.</text>
  <text x="400" y="364" font-size="10" text-anchor="middle" fill="#555">Old consumers continue working — no forced upgrades.</text>

  <!-- Caption -->
  <text x="400" y="428" font-size="14" text-anchor="middle" fill="#757575">Module 3.3 — Hub publish-consume workflow: Architect &#8594; Hub &#8594; Team &#8594; CI gate</text>
</svg>
