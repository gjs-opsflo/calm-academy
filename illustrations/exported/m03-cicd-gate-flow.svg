<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
    <marker id="arr-dash" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Virgil, 'Segoe UI Emoji', cursive; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="400" y="30" font-size="19" text-anchor="middle" font-weight="bold">CALM Architecture Gate — GitHub Actions flow</text>

  <!-- ===== MAIN SEQUENCE (3 steps, horizontal) ===== -->

  <!-- Step 1: PR opened -->
  <rect x="30" y="135" width="140" height="60" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <!-- Document icon hint -->
  <text x="100" y="157" font-size="13" text-anchor="middle" font-weight="bold">PR opened</text>
  <text x="100" y="175" font-size="9" text-anchor="middle" fill="#555">developer pushes</text>
  <text x="100" y="187" font-size="9" text-anchor="middle" fill="#555">architecture update</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="165" x2="240" y2="165" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="205" y="157" font-size="9" text-anchor="middle">triggers</text>

  <!-- Step 2: Checkout + Install CLI -->
  <rect x="240" y="135" width="175" height="60" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="327" y="157" font-size="11" text-anchor="middle" font-weight="bold">Checkout + Install</text>
  <text x="327" y="171" font-size="9" text-anchor="middle" font-family="monospace">npm install -g</text>
  <text x="327" y="183" font-size="9" text-anchor="middle" font-family="monospace">@finos/calm-cli</text>

  <!-- Arrow 2 -->
  <line x1="415" y1="165" x2="490" y2="165" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="452" y="157" font-size="9" text-anchor="middle">ready</text>

  <!-- Step 3: calm validate (central gate) -->
  <rect x="490" y="128" width="200" height="74" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="3"/>
  <text x="590" y="152" font-size="12" text-anchor="middle" font-weight="bold">calm validate</text>
  <text x="590" y="169" font-size="9" text-anchor="middle" font-family="monospace">-a arch.calm.json</text>
  <text x="590" y="183" font-size="9" text-anchor="middle" font-family="monospace">-p pattern.json</text>
  <text x="590" y="197" font-size="9" text-anchor="middle" fill="#555">-f junit -o results.xml</text>

  <!-- ===== PASS BRANCH (upward from step 3) ===== -->
  <!-- Arc line upward from right side of validate box -->
  <path d="M 690 155 Q 740 90 700 60" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="740" y="110" font-size="10" fill="#1e1e1e" font-weight="bold">&#10003; PASS</text>

  <!-- Architecture valid box -->
  <rect x="560" y="36" width="160" height="36" rx="5" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="640" y="59" font-size="12" text-anchor="middle">Architecture valid</text>

  <!-- Arrow valid → JUnit upload -->
  <line x1="560" y1="54" x2="440" y2="54" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- JUnit output box -->
  <rect x="290" y="36" width="150" height="36" rx="5" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="365" y="52" font-size="10" text-anchor="middle" font-family="monospace">-f junit</text>
  <text x="365" y="64" font-size="10" text-anchor="middle" font-family="monospace">results.xml</text>

  <!-- Arrow JUnit → upload-artifact -->
  <line x1="290" y1="54" x2="180" y2="54" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- upload-artifact box -->
  <rect x="30" y="36" width="150" height="36" rx="5" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="105" y="52" font-size="10" text-anchor="middle">upload-artifact</text>
  <text x="105" y="64" font-size="9" text-anchor="middle" fill="#555">(if: always())</text>

  <!-- Arrow → PR can merge -->
  <path d="M 30 54 Q 0 80 30 120" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- PR can merge box (heavy border) -->
  <rect x="30" y="120" width="150" height="50" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="3"/>
  <text x="105" y="142" font-size="13" text-anchor="middle" font-weight="bold">PR can merge</text>
  <text x="105" y="160" font-size="10" text-anchor="middle" fill="#555">exit code 0</text>

  <!-- ===== FAIL BRANCH (downward from step 3) ===== -->
  <!-- Arc line downward from bottom of validate box -->
  <path d="M 690 202 Q 740 268 700 296" fill="none" stroke="#1e1e1e" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-dash)"/>
  <text x="742" y="258" font-size="10" fill="#1e1e1e" font-weight="bold">&#10005; FAIL</text>

  <!-- Architecture invalid box (dashed) -->
  <rect x="558" y="296" width="164" height="36" rx="5" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="640" y="319" font-size="12" text-anchor="middle">Architecture invalid</text>

  <!-- Arrow invalid → Pipeline blocked -->
  <line x1="558" y1="314" x2="438" y2="314" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>

  <!-- Pipeline blocked box (dashed) -->
  <rect x="288" y="296" width="150" height="36" rx="5" fill="#ffffff" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="363" y="318" font-size="12" text-anchor="middle">Pipeline blocked</text>

  <!-- Arrow blocked → final fail box -->
  <line x1="288" y1="314" x2="178" y2="314" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>

  <!-- PR blocked box (dashed heavy) -->
  <rect x="28" y="290" width="150" height="48" rx="6" fill="#ffffff" stroke="#1e1e1e" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="103" y="311" font-size="12" text-anchor="middle">PR blocked</text>
  <text x="103" y="330" font-size="9" text-anchor="middle" fill="#555">exit code 1</text>

  <!-- Engineer note -->
  <text x="103" y="352" font-size="9" text-anchor="middle" fill="#555" font-style="italic">Engineers see error in</text>
  <text x="103" y="364" font-size="9" text-anchor="middle" fill="#555" font-style="italic">Problems panel / CI UI</text>

  <!-- Bottom annotation -->
  <rect x="50" y="390" width="700" height="50" rx="6" fill="#f5f5f5" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="410" font-size="10" text-anchor="middle" font-family="monospace">calm validate -f junit -o results.xml &#8594; upload-artifact &#8594; visible in GitHub Actions UI as test report</text>
  <text x="400" y="430" font-size="10" text-anchor="middle" fill="#555">JUnit report is always uploaded (pass or fail) so engineers can inspect results</text>

  <!-- Caption -->
  <text x="400" y="510" font-size="14" text-anchor="middle" fill="#757575">Module 3.7 — CALM Architecture Gate: GitHub Actions CI/CD flow</text>
</svg>
