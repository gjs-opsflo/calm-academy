<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" style="background:#ffffff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
  <style>text { font-family: Inter, system-ui, sans-serif; fill: #1e1e1e; }</style>

  <!-- Title -->
  <text x="400" y="32" font-size="19" text-anchor="middle" font-weight="bold">Actor Node — Initiating Interaction</text>

  <!-- LEFT: node-type label -->
  <text x="185" y="62" font-size="12" text-anchor="middle" fill="#757575">node-type: actor</text>

  <!-- Stick figure centred at 185,130 -->
  <circle cx="185" cy="94" r="24" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <line x1="185" y1="118" x2="185" y2="168" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="148" y1="142" x2="222" y2="142" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="185" y1="168" x2="155" y2="210" stroke="#1e1e1e" stroke-width="2"/>
  <line x1="185" y1="168" x2="215" y2="210" stroke="#1e1e1e" stroke-width="2"/>

  <!-- Actor label below -->
  <text x="185" y="236" font-size="15" text-anchor="middle" font-weight="bold">trading-analyst</text>
  <text x="185" y="260" font-size="13" text-anchor="middle" font-style="italic">Actors pull the trigger —</text>
  <text x="185" y="278" font-size="13" text-anchor="middle" font-style="italic">they initiate.</text>

  <!-- ARROW from actor to service (horizontal at y=142) -->
  <line x1="248" y1="142" x2="518" y2="142" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Relationship label above arrow -->
  <text x="383" y="130" font-size="15" text-anchor="middle" font-weight="bold">interacts</text>
  <!-- Annotation below arrow -->
  <text x="383" y="162" font-size="12" text-anchor="middle" fill="#757575">actor field = trading-analyst</text>

  <!-- RIGHT: node-type label -->
  <text x="610" y="62" font-size="12" text-anchor="middle" fill="#757575">node-type: service</text>

  <!-- Hexagon centred at 610,142 -->
  <polygon points="610,96 658,122 658,174 610,200 562,174 562,122" stroke="#1e1e1e" stroke-width="2" fill="#ffffff"/>
  <text x="610" y="152" font-size="13" text-anchor="middle">order-service</text>

  <!-- Service label below -->
  <text x="610" y="236" font-size="15" text-anchor="middle" font-weight="bold">order-service</text>
  <text x="610" y="260" font-size="13" text-anchor="middle" font-style="italic">Services respond —</text>
  <text x="610" y="278" font-size="13" text-anchor="middle" font-style="italic">they do not initiate.</text>

  <!-- Bottom annotation box -->
  <rect x="38" y="318" width="724" height="72" rx="6" ry="6" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="5,3" fill="#ffffff"/>
  <text x="400" y="346" font-size="13" text-anchor="middle">interacts.actor must reference a node of node-type: actor</text>
  <text x="400" y="368" font-size="13" text-anchor="middle">— not a service.</text>
</svg>
